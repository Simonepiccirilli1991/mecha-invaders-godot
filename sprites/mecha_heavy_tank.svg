  <rect x="36" y="47" width="8"  height="4"  rx="0.3" fill="#546E7A"/>
  <rect x="38" y="45" width="4"  height="8"  rx="0.3" fill="#546E7A"/>
  <circle cx="40" cy="49" r="1.5" fill="#B71C1C"/>

