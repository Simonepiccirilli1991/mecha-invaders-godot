  <rect x="34" y="26" width="12" height="16" rx="0.5" fill="#546E7A"/>
  <rect x="30" y="30" width="20" height="8"  rx="0.5" fill="#546E7A"/>
  <rect x="35" y="27" width="10" height="14" rx="0.3" fill="#607D8B"/>
  <rect x="31" y="31" width="18" height="6"  rx="0.3" fill="#607D8B"/>
  <circle cx="40" cy="34" r="4"   fill="#0D0D0D"/>
  <circle cx="40" cy="34" r="2.5" fill="#B71C1C"/>
  <circle cx="40" cy="34" r="1.2" fill="#EF5350"/>
  <!-- Torso side armor panels -->
  <rect x="8"  y="27" width="6" height="16" rx="0.5" fill="#0D0D0D"/>
  <rect x="9"  y="28" width="4" height="4"  fill="#1A1A1A"/>
  <rect x="9"  y="34" width="4" height="4"  fill="#1A1A1A"/>
  <rect x="9"  y="40" width="4" height="3"  fill="#B71C1C"/>
  <rect x="66" y="27" width="6" height="16" rx="0.5" fill="#0D0D0D"/>
  <rect x="67" y="28" width="4" height="4"  fill="#1A1A1A"/>
  <rect x="67" y="34" width="4" height="4"  fill="#1A1A1A"/>
  <rect x="67" y="40" width="4" height="3"  fill="#B71C1C"/>

  <!-- MEGA SHOULDERS (extends massively wide — Great Mazinger signature) -->
  <!-- Left mega pauldron -->
  <polygon points="-4,16 12,20 8,42 -6,38"  fill="#0D0D0D"/>
  <polygon points="-3,17 11,21 7,41 -5,37"  fill="#141414"/>
  <rect x="-2" y="26" width="13" height="2" fill="#546E7A"/>
  <rect x="-2" y="32" width="13" height="2" fill="#546E7A"/>
  <!-- DOUBLE CANNON on left shoulder -->
  <rect x="-8" y="19" width="8" height="20" rx="1" fill="#1A1A1A"/>
  <rect x="-7" y="20" width="6" height="18" rx="0.5" fill="#212121"/>
  <rect x="-8" y="18" width="4" height="5"  rx="0.5" fill="#0D0D0D"/><!-- barrel 1 -->
  <rect x="-5" y="18" width="4" height="5"  rx="0.5" fill="#0D0D0D"/><!-- barrel 2 -->
  <circle cx="-6" cy="18" r="1.5" fill="#B71C1C" opacity="0.9"/>
  <circle cx="-3" cy="18" r="1.5" fill="#B71C1C" opacity="0.9"/>
  <!-- Right mega pauldron -->
  <polygon points="84,16 68,20 72,42 86,38"  fill="#0D0D0D"/>
  <polygon points="83,17 69,21 73,41 85,37"  fill="#141414"/>
  <rect x="69" y="26" width="13" height="2" fill="#546E7A"/>
  <rect x="69" y="32" width="13" height="2" fill="#546E7A"/>
  <!-- Shield on right shoulder -->
  <rect x="80" y="18" width="8"  height="22" rx="1" fill="#1A1A1A"/>
  <rect x="81" y="19" width="6"  height="20" rx="0.5" fill="#212121"/>
  <rect x="81" y="22" width="6"  height="12" rx="0.3" fill="#B71C1C" opacity="0.4"/>

  <!-- LEFT ARM (crusher arm) -->
  <rect x="2"  y="36" width="14" height="10" rx="1" fill="#0D0D0D"/>
  <rect x="3"  y="37" width="12" height="8"  rx="1" fill="#141414"/>
  <rect x="1"  y="46" width="16" height="4"  rx="1.5" fill="#0A0A0A"/>
  <rect x="1"  y="50" width="16" height="12" rx="1" fill="#0D0D0D"/>
  <rect x="2"  y="51" width="14" height="10" rx="1" fill="#141414"/>
  <rect x="3"  y="54" width="10" height="2"  fill="#546E7A"/>
  <!-- Spiked fist left -->
  <rect x="1"  y="62" width="16" height="10" rx="2" fill="#0D0D0D"/>
  <rect x="2"  y="63" width="14" height="8"  rx="1" fill="#141414"/>
  <polygon points="3,62 6,57 9,62"  fill="#546E7A"/>
  <polygon points="9,62 12,57 15,62" fill="#546E7A"/>

  <!-- RIGHT ARM (pile driver arm) -->
  <rect x="64" y="36" width="14" height="10" rx="1" fill="#0D0D0D"/>
  <rect x="65" y="37" width="12" height="8"  rx="1" fill="#141414"/>
  <rect x="63" y="46" width="16" height="4"  rx="1.5" fill="#0A0A0A"/>
  <rect x="63" y="50" width="16" height="12" rx="1" fill="#0D0D0D"/>
  <rect x="64" y="51" width="14" height="10" rx="1" fill="#141414"/>
  <rect x="65" y="54" width="10" height="2"  fill="#546E7A"/>
  <!-- Pile driver drill fist right -->
  <rect x="63" y="62" width="16" height="10" rx="2" fill="#0D0D0D"/>
  <rect x="64" y="63" width="14" height="8"  rx="1" fill="#141414"/>
  <polygon points="65,62 68,57 71,62"  fill="#546E7A"/>
  <polygon points="71,62 74,57 77,62"  fill="#546E7A"/>

  <!-- NECK -->
  <rect x="33" y="18" width="14" height="5" rx="1" fill="#0D0D0D"/>

  <!-- HEAD (brutalist, intimidating — single-eye mono visor) -->
  <rect x="20" y="5"  width="40" height="14" rx="2" fill="#0D0D0D"/>
  <rect x="21" y="6"  width="38" height="12" rx="1" fill="#141414"/>
  <!-- Forehead blade fin (Great Mazinger's iconic blade) -->
  <polygon points="30,5 50,5 46,0 34,0" fill="#0D0D0D"/>
  <polygon points="31,5 49,5 45,1 35,1" fill="#1A1A1A"/>
  <rect x="37" y="-2" width="6" height="4" rx="0.5" fill="#B71C1C"/>
  <!-- Side vent blocks -->
  <rect x="16" y="8"  width="6"  height="8"  rx="0.5" fill="#141414"/>
  <rect x="17" y="9"  width="4"  height="2"  fill="#546E7A"/>
  <rect x="17" y="12" width="4"  height="2"  fill="#546E7A"/>
  <rect x="58" y="8"  width="6"  height="8"  rx="0.5" fill="#141414"/>
  <rect x="59" y="9"  width="4"  height="2"  fill="#546E7A"/>
  <rect x="59" y="12" width="4"  height="2"  fill="#546E7A"/>
  <!-- Forehead plate -->
  <rect x="22" y="6"  width="36" height="4"  rx="0.5" fill="#1A1A1A"/>
  <!-- MONO-EYE VISOR (single red scan line — intimidating) -->
  <rect x="22" y="11" width="36" height="5"  rx="0.5" fill="#1A1A1A"/>
  <rect x="22" y="12" width="36" height="3"  rx="0.3" fill="#B71C1C"/>
  <rect x="23" y="12.3" width="34" height="2.4" rx="0.2" fill="#EF5350"/>
  <rect x="30" y="12.5" width="20" height="2" fill="#FF5252" opacity="0.8"/>
  <!-- Scan line flare -->
  <ellipse cx="40" cy="13.5" rx="5" ry="1" fill="#FFCDD2" opacity="0.6"/>
  <!-- Chin guard (massive jaw) -->
  <rect x="22" y="17" width="36" height="4"  rx="0.5" fill="#0D0D0D"/>
  <rect x="24" y="18" width="8"  height="2"  rx="0.3" fill="#1A1A1A"/>
  <rect x="34" y="18" width="12" height="2"  rx="0.3" fill="#1A1A1A"/>
  <rect x="48" y="18" width="8"  height="2"  rx="0.3" fill="#1A1A1A"/>
  <!-- Red head horn side spikes -->
  <polygon points="20,8  14,5  18,12"  fill="#B71C1C"/>
  <polygon points="60,8  66,5  62,12"  fill="#B71C1C"/>
</svg>
