<?xml version="1.0" encoding="UTF-8"?>
<!-- FORTRESS — The Iron Wall | Inspired by Great Mazinger / Daimos -->
<!-- Jet Black #0D0D0D · Dark Navy #0A1628 · Crimson #B71C1C · Steel #546E7A -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" width="80" height="100">

  <!-- FEET (huge, armored, flat) -->
  <rect x="10" y="90" width="26" height="9"  rx="2" fill="#0A0A0A"/>
  <rect x="8"  y="93" width="30" height="6"  rx="1" fill="#141414"/>
  <rect x="10" y="93" width="6"  height="6"  rx="0.5" fill="#1A1A1A"/>
  <rect x="44" y="90" width="26" height="9"  rx="2" fill="#0A0A0A"/>
  <rect x="42" y="93" width="30" height="6"  rx="1" fill="#141414"/>
  <rect x="44" y="93" width="6"  height="6"  rx="0.5" fill="#1A1A1A"/>
  <!-- Red boot stripe -->
  <rect x="10" y="90" width="26" height="2" fill="#B71C1C"/>
  <rect x="44" y="90" width="26" height="2" fill="#B71C1C"/>

  <!-- SHINS (thick armored plates) -->
  <rect x="12" y="68" width="24" height="24" rx="1" fill="#0D0D0D"/>
  <rect x="13" y="69" width="22" height="22" rx="1" fill="#1A1A1A"/>
  <rect x="14" y="70" width="20" height="8"  rx="0.5" fill="#212121"/>
  <!-- Armor bolt detail -->
  <circle cx="16" cy="72" r="1.2" fill="#546E7A"/>
  <circle cx="32" cy="72" r="1.2" fill="#546E7A"/>
  <circle cx="16" cy="80" r="1.2" fill="#546E7A"/>
  <circle cx="32" cy="80" r="1.2" fill="#546E7A"/>
  <!-- Crimson shin accent -->
  <rect x="15" y="83" width="16" height="3"  rx="0.5" fill="#B71C1C"/>
  <rect x="44" y="68" width="24" height="24" rx="1" fill="#0D0D0D"/>
  <rect x="45" y="69" width="22" height="22" rx="1" fill="#1A1A1A"/>
  <rect x="46" y="70" width="20" height="8"  rx="0.5" fill="#212121"/>
  <circle cx="48" cy="72" r="1.2" fill="#546E7A"/>
  <circle cx="64" cy="72" r="1.2" fill="#546E7A"/>
  <circle cx="48" cy="80" r="1.2" fill="#546E7A"/>
  <circle cx="64" cy="80" r="1.2" fill="#546E7A"/>
  <rect x="49" y="83" width="16" height="3"  rx="0.5" fill="#B71C1C"/>

  <!-- KNEES (brutal double guard) -->
  <rect x="10" y="62" width="28" height="8"  rx="2" fill="#0D0D0D"/>
  <rect x="11" y="63" width="26" height="6"  rx="1" fill="#141414"/>
  <!-- Knee spike center -->
  <polygon points="22,58 26,63 18,63" fill="#B71C1C"/>
  <rect x="42" y="62" width="28" height="8"  rx="2" fill="#0D0D0D"/>
  <rect x="43" y="63" width="26" height="6"  rx="1" fill="#141414"/>
  <polygon points="58,58 62,63 54,63" fill="#B71C1C"/>

  <!-- THIGHS (massive) -->
  <rect x="11" y="50" width="24" height="14" rx="1" fill="#0D0D0D"/>
  <rect x="12" y="51" width="22" height="12" rx="1" fill="#1A1A1A"/>
  <rect x="43" y="50" width="24" height="14" rx="1" fill="#0D0D0D"/>
  <rect x="44" y="51" width="22" height="12" rx="1" fill="#1A1A1A"/>

