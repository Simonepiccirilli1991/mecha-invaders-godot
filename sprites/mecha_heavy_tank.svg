  <rect x="12" y="46" width="56" height="6"  rx="1" fill="#0D0D0D"/>
  <rect x="13" y="47" width="54" height="4"  rx="0.5" fill="#141414"/>
  <polygon points="16,50 22,58 14,58" fill="#0D0D0D"/>
  <polygon points="64,50 58,58 66,58" fill="#0D0D0D"/>
