  <rect x="54.5" y="3" width="5" height="3" rx="0.5" fill="#455A64"/>
  <!-- Energy glow at barrel tip -->
  <rect x="55" y="1" width="4" height="4" fill="#00E5FF" opacity="0.9"/>
  <ellipse cx="57" cy="2" rx="3" ry="2" fill="#00E5FF" opacity="0.7"/>
  <ellipse cx="57" cy="1" rx="2" ry="1.5" fill="#FFFFFF" opacity="0.8"/>
  <!-- Beam line shooting effect -->
  <line x1="57" y1="0" x2="57" y2="3" stroke="#00E5FF" stroke-width="3" opacity="0.6"/>

  <!-- === NECK === -->
  <rect x="28" y="14" width="8" height="3" fill="#0D47A1"/>

  <!-- === HEAD === -->
  <!-- Side vents -->
  <rect x="24" y="7" width="1.5" height="5" fill="#42A5F5"/>
  <rect x="38.5" y="7" width="1.5" height="5" fill="#42A5F5"/>
  <!-- Main head box -->
  <rect x="24" y="4" width="16" height="10" fill="#1565C0" stroke="#0D47A1" stroke-width="0.6"/>
  <!-- Face plate -->
  <rect x="25" y="5" width="14" height="8" fill="#1976D2"/>
  <!-- Forehead sensor -->
  <circle cx="32" cy="6" r="1" fill="#00E5FF"/>
  <!-- Left eye -->
  <rect x="25" y="8" width="5" height="2.5" rx="0.5" fill="#00E5FF"/>
  <rect x="25.5" y="8.3" width="2" height="1" fill="#FFFFFF" opacity="0.5"/>
  <!-- Right eye -->
  <rect x="34" y="8" width="5" height="2.5" rx="0.5" fill="#00E5FF"/>
  <rect x="34.5" y="8.3" width="2" height="1" fill="#FFFFFF" opacity="0.5"/>
  <!-- Mouth guard -->
  <rect x="27" y="11" width="10" height="2" fill="#1976D2"/>
  <line x1="27" y1="12" x2="37" y2="12" stroke="#0D47A1" stroke-width="0.5"/>

  <!-- V-FIN -->
  <path d="M 30 4 L 27 0 L 32 2 Z" fill="#FFD700"/>
  <path d="M 34 4 L 37 0 L 32 2 Z" fill="#FFD700"/>
  <!-- Center crest -->
  <rect x="31" y="1" width="2" height="3" fill="#FFEB3B"/>

</svg>
