  <rect x="18" y="56" width="8" height="4" rx="1" fill="#1976D2"/>
  <rect x="19" y="57" width="6" height="2" fill="#42A5F5"/>
  <rect x="38" y="56" width="8" height="4" rx="1" fill="#1976D2"/>
