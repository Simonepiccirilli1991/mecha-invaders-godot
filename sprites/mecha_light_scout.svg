  <path d="M 14 15 L 8 17 L 8 23 L 16 21 Z" fill="#1976D2" stroke="#0D47A1" stroke-width="0.6"/>
  <path d="M 50 15 L 56 17 L 56 23 L 48 21 Z" fill="#1976D2" stroke="#0D47A1" stroke-width="0.6"/>

