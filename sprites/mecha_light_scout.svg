  <!-- Trigger area -->
  <rect x="55" y="34" width="4" height="1.5" rx="0.5" fill="#546E7A"/>
  <!-- Rifle grip/hand -->
  <rect x="54" y="33" width="5" height="5" rx="1" fill="#37474F" stroke="#1C2833"/>
  <!-- Barrel -->
  <rect x="55" y="4" width="4" height="18" fill="#37474F" stroke="#263238" stroke-width="0.4"/>
