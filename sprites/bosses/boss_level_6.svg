  <circle cx="4" cy="22" r="5" fill="#44ff22" opacity="0.6"/>
  <circle cx="92" cy="22" r="5" fill="#44ff22" opacity="0.6"/>
  <!-- Main body - organic blob -->
  <ellipse cx="48" cy="50" rx="28" ry="26" fill="#0d0025"/>
  <ellipse cx="48" cy="48" rx="24" ry="22" fill="#150035"/>
  <!-- Pustule bumps -->
  <circle cx="36" cy="42" r="7" fill="#1a0040"/>
  <circle cx="60" cy="44" r="8" fill="#1a0040"/>
  <circle cx="44" cy="60" r="6" fill="#1a0040"/>
  <circle cx="56" cy="62" r="5" fill="#1a0040"/>
  <circle cx="38" cy="58" r="4" fill="#1a0040"/>
  <!-- Pustule glow centers -->
  <circle cx="36" cy="42" r="4" fill="#aa22ff" opacity="0.5"/>
  <circle cx="60" cy="44" r="5" fill="#44ff22" opacity="0.4"/>
  <circle cx="44" cy="60" r="3" fill="#aa22ff" opacity="0.5"/>
  <circle cx="56" cy="62" r="3" fill="#44ff22" opacity="0.4"/>
  <!-- Head lobe -->
  <ellipse cx="48" cy="28" rx="20" ry="16" fill="#0d0025"/>
  <ellipse cx="48" cy="26" rx="16" ry="12" fill="#150035"/>
  <!-- Multiple eyes -->
  <circle cx="38" cy="24" r="7" fill="#050012"/>
  <circle cx="58" cy="24" r="7" fill="#050012"/>
  <circle cx="48" cy="30" r="5" fill="#050012"/>
  <circle cx="38" cy="24" r="5" fill="#8800cc"/>
  <circle cx="58" cy="24" r="5" fill="#44ff00"/>
  <circle cx="48" cy="30" r="3.5" fill="#cc00aa"/>
  <!-- Pupils -->
  <circle cx="38" cy="24" r="2.5" fill="#000000"/>
  <circle cx="58" cy="24" r="2.5" fill="#000000"/>
  <circle cx="48" cy="30" r="2" fill="#000000"/>
  <!-- Eye shine -->
  <circle cx="39" cy="23" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="59" cy="23" r="1" fill="#ffffff" opacity="0.6"/>
  <!-- Maw / mouth slit -->
  <path d="M 34 36 Q 48 44 62 36" fill="#050012"/>
  <path d="M 36 37 Q 48 42 60 37" fill="#2a0066" opacity="0.5"/>
  <!-- Teeth -->
  <polygon points="38,36 36,42 41,36" fill="#ccaaff" opacity="0.7"/>
  <polygon points="45,36 43,43 48,36" fill="#ccaaff" opacity="0.7"/>
  <polygon points="52,36 50,43 55,36" fill="#ccaaff" opacity="0.7"/>
  <polygon points="59,36 57,42 62,36" fill="#ccaaff" opacity="0.7"/>
