  <path d="M 42 43 Q 40 52 42 58" fill="none" stroke="#44ff22" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M 54 43 Q 56 52 54 58" fill="none" stroke="#44ff22" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Body outline glow -->
  <ellipse cx="48" cy="50" rx="28" ry="26" fill="none" stroke="#6600cc" stroke-width="1.5" opacity="0.4"/>
