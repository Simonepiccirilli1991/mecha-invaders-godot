  <circle cx="84" cy="88" r="5" fill="#44ff22" opacity="0.6"/>
  <circle cx="18" cy="92" r="4" fill="#aa44ff" opacity="0.6"/>
  <circle cx="78" cy="92" r="4" fill="#aa44ff" opacity="0.6"/>
