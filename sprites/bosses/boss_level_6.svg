  <path d="M 48 62 Q 76 72 84 88" fill="none" stroke="#1a0044" stroke-width="8" stroke-linecap="round"/>
  <path d="M 48 62 Q 22 78 18 92" fill="none" stroke="#1a0044" stroke-width="6" stroke-linecap="round"/>
  <path d="M 48 62 Q 74 78 78 92" fill="none" stroke="#1a0044" stroke-width="6" stroke-linecap="round"/>
  <path d="M 38 68 Q 18 80 10 96" fill="none" stroke="#220055" stroke-width="5" stroke-linecap="round"/>
  <path d="M 58 68 Q 78 80 86 96" fill="none" stroke="#220055" stroke-width="5" stroke-linecap="round"/>
  <!-- Tentacle tips (sucker ends) -->
