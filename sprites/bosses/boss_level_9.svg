<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Omega Machine - Ultimate War Robot Boss -->
  <!-- Thruster exhausts -->
  <rect x="20" y="82" width="14" height="14" rx="2" fill="#040c1a"/>
  <rect x="62" y="82" width="14" height="14" rx="2" fill="#040c1a"/>
  <ellipse cx="27" cy="96" rx="8" ry="4" fill="#0066ff" opacity="0.6"/>
  <ellipse cx="69" cy="96" rx="8" ry="4" fill="#0066ff" opacity="0.6"/>
  <!-- Shoulder missile launchers -->
  <rect x="2" y="22" width="18" height="28" rx="3" fill="#060e1e"/>
  <rect x="76" y="22" width="18" height="28" rx="3" fill="#060e1e"/>
  <!-- Missiles in launcher -->
  <rect x="5" y="24" width="5" height="14" rx="2" fill="#0a1830"/>
  <rect x="11" y="24" width="5" height="14" rx="2" fill="#0a1830"/>
  <polygon points="5,24 7.5,18 10,24" fill="#cc0000" opacity="0.8"/>
  <polygon points="11,24 13.5,18 16,24" fill="#cc0000" opacity="0.8"/>
  <rect x="79" y="24" width="5" height="14" rx="2" fill="#0a1830"/>
  <rect x="85" y="24" width="5" height="14" rx="2" fill="#0a1830"/>
  <polygon points="79,24 81.5,18 84,24" fill="#cc0000" opacity="0.8"/>
  <polygon points="85,24 87.5,18 90,24" fill="#cc0000" opacity="0.8"/>
  <!-- Shoulder cannon barrel -->
  <rect x="0" y="36" width="12" height="8" rx="2" fill="#040c1a"/>
  <rect x="84" y="36" width="12" height="8" rx="2" fill="#040c1a"/>
  <circle cx="2" cy="40" r="3" fill="#0066ff" opacity="0.7"/>
  <circle cx="94" cy="40" r="3" fill="#0066ff" opacity="0.7"/>
  <!-- Main body chassis -->
  <rect x="18" y="14" width="60" height="70" rx="5" fill="#060e1e"/>
  <rect x="20" y="16" width="56" height="66" rx="4" fill="#0a1428"/>
  <!-- Chest armor plates -->
  <rect x="24" y="22" width="48" height="36" rx="3" fill="#060c1c"/>
  <!-- Central power core -->
  <rect x="34" y="28" width="28" height="24" rx="3" fill="#040a16"/>
  <rect x="36" y="30" width="24" height="20" rx="2" fill="#0a1630"/>
  <ellipse cx="48" cy="40" rx="10" ry="9" fill="#001844"/>
  <ellipse cx="48" cy="40" rx="7" ry="6" fill="#003388"/>
  <ellipse cx="48" cy="40" rx="4" ry="4" fill="#0066cc"/>
  <ellipse cx="48" cy="40" rx="2" ry="2" fill="#44aaff"/>
  <!-- Core energy ring -->
  <circle cx="48" cy="40" rx="10" ry="9" fill="none" stroke="#0088ff" stroke-width="1.5" opacity="0.7"/>
  <!-- Armor rivets -->
  <circle cx="26" cy="24" r="1.5" fill="#0a1830"/>
  <circle cx="70" cy="24" r="1.5" fill="#0a1830"/>
  <circle cx="26" cy="56" r="1.5" fill="#0a1830"/>
  <circle cx="70" cy="56" r="1.5" fill="#0a1830"/>
  <!-- Head unit -->
  <rect x="26" y="2" width="44" height="16" rx="4" fill="#060e1e"/>
  <rect x="28" y="4" width="40" height="12" rx="3" fill="#0a1428"/>
  <!-- Visor -->
  <rect x="30" y="6" width="36" height="7" rx="2" fill="#001122"/>
  <rect x="31" y="7" width="34" height="5" rx="1" fill="#002244"/>
  <!-- Visor scan line -->
  <rect x="31" y="9" width="34" height="2" fill="#0066ff" opacity="0.6"/>
  <!-- Side sensor nodes on head -->
  <circle cx="27" cy="10" r="3" fill="#040c1a"/>
  <circle cx="27" cy="10" r="2" fill="#0044aa" opacity="0.8"/>
  <circle cx="69" cy="10" r="3" fill="#040c1a"/>
  <circle cx="69" cy="10" r="2" fill="#0044aa" opacity="0.8"/>
  <!-- Antenna array -->
  <rect x="44" y="0" width="3" height="4" fill="#060e1e"/>
  <line x1="38" y1="0" x2="36" y2="3" stroke="#0a1428" stroke-width="2"/>
  <line x1="58" y1="0" x2="60" y2="3" stroke="#0a1428" stroke-width="2"/>
  <circle cx="45" cy="0" r="2" fill="#0066ff" opacity="0.8"/>
  <!-- Lower body / waist -->
  <rect x="22" y="62" width="52" height="14" rx="3" fill="#040c1a"/>
  <!-- Leg actuators -->
  <rect x="24" y="74" width="18" height="10" rx="3" fill="#060e1e"/>
  <rect x="54" y="74" width="18" height="10" rx="3" fill="#060e1e"/>
  <!-- Hydraulics -->
  <rect x="28" y="72" width="4" height="12" rx="1" fill="#0a1830"/>
  <rect x="64" y="72" width="4" height="12" rx="1" fill="#0a1830"/>
  <!-- Electric arc detail -->
  <polyline points="22,40 16,48 24,48 18,56" fill="none" stroke="#0099ff" stroke-width="1.5" opacity="0.5"/>
  <polyline points="74,40 80,48 72,48 78,56" fill="none" stroke="#0099ff" stroke-width="1.5" opacity="0.5"/>
  <!-- Warning markings -->
  <polygon points="44,62 48,55 52,62" fill="#ffaa00" opacity="0.4"/>
  <!-- Chassis glow outline -->
  <rect x="18" y="14" width="60" height="70" rx="5" fill="none" stroke="#0066ff" stroke-width="1" opacity="0.3"/>
</svg>
