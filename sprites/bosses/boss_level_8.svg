<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Void Rift Keeper - Cosmic Eye of Destruction -->
  <!-- Outer reality rift tendrils -->
  <path d="M 48 48 Q 10 30 2 10" fill="none" stroke="#330066" stroke-width="6" stroke-linecap="round"/>
  <path d="M 48 48 Q 86 30 94 10" fill="none" stroke="#330066" stroke-width="6" stroke-linecap="round"/>
  <path d="M 48 48 Q 16 58 8 80" fill="none" stroke="#220055" stroke-width="5" stroke-linecap="round"/>
  <path d="M 48 48 Q 80 58 88 80" fill="none" stroke="#220055" stroke-width="5" stroke-linecap="round"/>
  <path d="M 48 48 Q 0 48 4 60" fill="none" stroke="#440088" stroke-width="4" stroke-linecap="round"/>
  <path d="M 48 48 Q 96 48 92 60" fill="none" stroke="#440088" stroke-width="4" stroke-linecap="round"/>
  <path d="M 48 48 Q 28 10 20 2" fill="none" stroke="#330066" stroke-width="4" stroke-linecap="round"/>
  <path d="M 48 48 Q 68 10 76 2" fill="none" stroke="#330066" stroke-width="4" stroke-linecap="round"/>
  <!-- Tendril tip void sparks -->
  <circle cx="2" cy="10" r="4" fill="#8800ff" opacity="0.8"/>
  <circle cx="94" cy="10" r="4" fill="#8800ff" opacity="0.8"/>
  <circle cx="8" cy="80" r="3" fill="#aa00ff" opacity="0.7"/>
  <circle cx="88" cy="80" r="3" fill="#aa00ff" opacity="0.7"/>
  <circle cx="4" cy="60" r="3" fill="#6600cc" opacity="0.7"/>
  <circle cx="92" cy="60" r="3" fill="#6600cc" opacity="0.7"/>
  <!-- Cosmic nebula surrounding eye -->
  <circle cx="48" cy="48" r="34" fill="#0d0022" opacity="0.9"/>
  <circle cx="48" cy="48" r="28" fill="#110030"/>
  <!-- Star field within -->
  <circle cx="28" cy="32" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="68" cy="28" r="1.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="22" cy="60" r="0.8" fill="#aabbff" opacity="0.6"/>
  <circle cx="72" cy="64" r="1" fill="#aabbff" opacity="0.5"/>
  <circle cx="42" cy="22" r="0.8" fill="#ffffff" opacity="0.5"/>
  <circle cx="58" cy="72" r="1" fill="#ffffff" opacity="0.4"/>
  <!-- The Great Eye outer ring -->
  <circle cx="48" cy="48" r="22" fill="#06001a"/>
  <circle cx="48" cy="48" r="20" fill="#0a0030"/>
  <!-- Iris - cosmic iris -->
  <circle cx="48" cy="48" r="18" fill="#1a0055"/>
  <!-- Iris rings -->
  <circle cx="48" cy="48" r="18" fill="none" stroke="#5500cc" stroke-width="2" opacity="0.7"/>
  <circle cx="48" cy="48" r="14" fill="none" stroke="#7700ff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="48" cy="48" r="10" fill="none" stroke="#9922ff" stroke-width="1" opacity="0.5"/>
  <!-- Iris color gradients (simulated with concentric) -->
  <circle cx="48" cy="48" r="16" fill="#220066" opacity="0.7"/>
  <circle cx="48" cy="48" r="12" fill="#330088" opacity="0.7"/>
  <circle cx="48" cy="48" r="8" fill="#5500aa" opacity="0.8"/>
  <!-- Pupil - absolute void -->
  <circle cx="48" cy="48" r="6" fill="#000000"/>
  <circle cx="48" cy="48" r="5" fill="#050005"/>
  <!-- Pupil slit (vertical) -->
  <ellipse cx="48" cy="48" rx="2" ry="5.5" fill="#000000"/>
  <!-- Cosmic ray lines from iris -->
  <g stroke="#7700ff" stroke-width="1" opacity="0.5">
    <line x1="48" y1="30" x2="48" y2="26"/><line x1="60" y1="34" x2="63" y2="31"/>
    <line x1="66" y1="48" x2="70" y2="48"/><line x1="60" y1="62" x2="63" y2="65"/>
    <line x1="48" y1="66" x2="48" y2="70"/><line x1="36" y1="62" x2="33" y2="65"/>
    <line x1="30" y1="48" x2="26" y2="48"/><line x1="36" y1="34" x2="33" y2="31"/>
  </g>
  <!-- Eyelid - cosmic membrane top -->
  <path d="M 26 40 Q 48 26 70 40" fill="#0a0025"/>
  <path d="M 27 41 Q 48 28 69 41" fill="#110035" opacity="0.5"/>
  <!-- Eyelid bottom -->
  <path d="M 26 56 Q 48 70 70 56" fill="#0a0025"/>
  <path d="M 27 55 Q 48 68 69 55" fill="#110035" opacity="0.5"/>
  <!-- Eye glow reflection -->
  <ellipse cx="43" cy="42" rx="4" ry="3" fill="#ffffff" opacity="0.12"/>
  <!-- Crown of void crystals -->
  <polygon points="36,26 32,16 40,28" fill="#220055"/>
  <polygon points="48,24 46,12 50,12 52,24" fill="#330066"/>
  <polygon points="60,26 64,16 56,28" fill="#220055"/>
  <polygon points="38,24 34,14 42,26" fill="#440088" opacity="0.6"/>
  <polygon points="58,24 62,14 54,26" fill="#440088" opacity="0.6"/>
  <!-- Crystal tips glow -->
  <circle cx="36" cy="16" r="2" fill="#aa00ff" opacity="0.8"/>
  <circle cx="48" cy="12" r="2.5" fill="#cc00ff" opacity="0.9"/>
  <circle cx="60" cy="16" r="2" fill="#aa00ff" opacity="0.8"/>
</svg>
