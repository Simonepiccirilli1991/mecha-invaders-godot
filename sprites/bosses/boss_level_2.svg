<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Nuclear Colossus - Radioactive Robot Boss -->
  <!-- Shoulders -->
  <rect x="4" y="28" width="22" height="18" rx="4" fill="#2a3a10"/>
  <rect x="70" y="28" width="22" height="18" rx="4" fill="#2a3a10"/>
  <!-- Shoulder spikes -->
  <polygon points="4,28 14,18 26,28" fill="#1a2808"/>
  <polygon points="70,28 82,18 92,28" fill="#1a2808"/>
  <!-- Arms -->
  <rect x="2" y="44" width="14" height="32" rx="3" fill="#2a3a10"/>
  <rect x="80" y="44" width="14" height="32" rx="3" fill="#2a3a10"/>
  <!-- Arm cannons -->
  <rect x="0" y="52" width="8" height="10" rx="2" fill="#1a2808"/>
  <rect x="88" y="52" width="8" height="10" rx="2" fill="#1a2808"/>
  <circle cx="4" cy="57" r="3" fill="#44ff00" opacity="0.8"/>
  <circle cx="92" cy="57" r="3" fill="#44ff00" opacity="0.8"/>
  <!-- Main body -->
  <rect x="22" y="20" width="52" height="60" rx="6" fill="#2a3a10"/>
  <rect x="26" y="24" width="44" height="52" rx="4" fill="#1e2e0c"/>
  <!-- Radioactive core (chest) -->
  <circle cx="48" cy="52" r="18" fill="#0a1405"/>
  <circle cx="48" cy="52" r="14" fill="#1a3300"/>
  <circle cx="48" cy="52" r="10" fill="#22aa00" opacity="0.8"/>
  <circle cx="48" cy="52" r="6" fill="#44ff00" opacity="0.9"/>
  <!-- Radioactive symbol on core -->
  <circle cx="48" cy="52" r="3" fill="#001100"/>
  <line x1="48" y1="52" x2="48" y2="40" stroke="#001100" stroke-width="2"/>
  <line x1="48" y1="52" x2="58" y2="58" stroke="#001100" stroke-width="2"/>
  <line x1="48" y1="52" x2="38" y2="58" stroke="#001100" stroke-width="2"/>
  <!-- Head -->
  <rect x="30" y="6" width="36" height="20" rx="5" fill="#2a3a10"/>
  <rect x="33" y="8" width="30" height="16" rx="3" fill="#1e2e0c"/>
  <!-- Eyes -->
  <rect x="34" y="11" width="10" height="8" rx="2" fill="#001100"/>
  <rect x="52" y="11" width="10" height="8" rx="2" fill="#001100"/>
  <rect x="35" y="12" width="8" height="6" rx="1" fill="#44ff00" opacity="0.9"/>
  <rect x="53" y="12" width="8" height="6" rx="1" fill="#44ff00" opacity="0.9"/>
  <!-- Antenna -->
  <rect x="45" y="0" width="6" height="8" rx="2" fill="#1a2808"/>
  <circle cx="48" cy="0" r="4" fill="#44ff00" opacity="0.9"/>
  <!-- Legs -->
  <rect x="28" y="78" width="16" height="14" rx="3" fill="#2a3a10"/>
  <rect x="52" y="78" width="16" height="14" rx="3" fill="#2a3a10"/>
  <rect x="26" y="88" width="20" height="8" rx="2" fill="#1a2808"/>
  <rect x="50" y="88" width="20" height="8" rx="2" fill="#1a2808"/>
  <!-- Toxic drip -->
  <circle cx="48" cy="52" r="18" fill="none" stroke="#44ff00" stroke-width="1" opacity="0.4"/>
</svg>
