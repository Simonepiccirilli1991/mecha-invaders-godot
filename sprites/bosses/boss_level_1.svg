<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Inferno Drake - Fire Dragon Boss -->
  <!-- Wings -->
  <polygon points="48,30 8,10 18,45" fill="#cc2200" opacity="0.85"/>
  <polygon points="48,30 88,10 78,45" fill="#cc2200" opacity="0.85"/>
  <polygon points="48,30 10,8 16,28" fill="#ff4400" opacity="0.6"/>
  <polygon points="48,30 86,8 80,28" fill="#ff4400" opacity="0.6"/>
  <!-- Body -->
  <ellipse cx="48" cy="52" rx="20" ry="28" fill="#8b1a00"/>
  <ellipse cx="48" cy="48" rx="16" ry="22" fill="#aa2200"/>
  <!-- Head -->
  <ellipse cx="48" cy="26" rx="14" ry="12" fill="#aa2200"/>
  <!-- Snout -->
  <ellipse cx="48" cy="20" rx="8" ry="6" fill="#882200"/>
  <!-- Horns -->
  <polygon points="38,18 32,4 42,16" fill="#660000"/>
  <polygon points="58,18 64,4 54,16" fill="#660000"/>
  <!-- Eyes -->
  <circle cx="42" cy="24" r="4" fill="#ff6600"/>
  <circle cx="54" cy="24" r="4" fill="#ff6600"/>
  <circle cx="42" cy="24" r="2" fill="#ffcc00"/>
  <circle cx="54" cy="24" r="2" fill="#ffcc00"/>
  <!-- Fire breath -->
  <ellipse cx="48" cy="14" rx="5" ry="8" fill="#ff8800" opacity="0.8"/>
  <ellipse cx="48" cy="10" rx="3" ry="5" fill="#ffcc00" opacity="0.7"/>
  <!-- Belly scales -->
  <ellipse cx="48" cy="55" rx="10" ry="14" fill="#661100" opacity="0.6"/>
  <!-- Tail -->
  <path d="M 42 75 Q 30 85 38 92 Q 46 96 50 88 Q 52 80 48 78 Z" fill="#882200"/>
  <!-- Claws -->
  <polygon points="34,75 28,82 32,78" fill="#550000"/>
  <polygon points="62,75 68,82 64,78" fill="#550000"/>
  <polygon points="42,80 38,88 44,84" fill="#550000"/>
  <polygon points="54,80 58,88 52,84" fill="#550000"/>
  <!-- Fire glow outline -->
  <ellipse cx="48" cy="48" rx="22" ry="30" fill="none" stroke="#ff4400" stroke-width="1.5" opacity="0.5"/>
</svg>
