<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Apocalypse Engine - The Final Destroyer -->
  <!-- Outermost chaos aura -->
  <circle cx="48" cy="48" r="46" fill="#110000" opacity="0.7"/>
  <!-- Chaos tendrils (fire + void + machine + magic) -->
  <path d="M 48 48 Q 10 24 2 4" fill="none" stroke="#cc2200" stroke-width="5" stroke-linecap="round"/>
  <path d="M 48 48 Q 86 24 94 4" fill="none" stroke="#4400aa" stroke-width="5" stroke-linecap="round"/>
  <path d="M 48 48 Q 8 56 2 80" fill="none" stroke="#cc2200" stroke-width="4" stroke-linecap="round"/>
  <path d="M 48 48 Q 88 56 94 80" fill="none" stroke="#4400aa" stroke-width="4" stroke-linecap="round"/>
  <path d="M 48 48 Q 24 8 18 2" fill="none" stroke="#004499" stroke-width="3" stroke-linecap="round"/>
  <path d="M 48 48 Q 72 8 78 2" fill="none" stroke="#006622" stroke-width="3" stroke-linecap="round"/>
  <!-- Tendril ends -->
  <circle cx="2" cy="4" r="4" fill="#ff4400" opacity="0.8"/>
  <circle cx="94" cy="4" r="4" fill="#8800ff" opacity="0.8"/>
  <circle cx="2" cy="80" r="3" fill="#ff2200" opacity="0.7"/>
  <circle cx="94" cy="80" r="3" fill="#6600cc" opacity="0.7"/>
  <circle cx="18" cy="2" r="3" fill="#0066ff" opacity="0.7"/>
  <circle cx="78" cy="2" r="3" fill="#00aa44" opacity="0.7"/>
  <!-- Machine outer frame -->
  <rect x="14" y="16" width="68" height="68" rx="6" fill="#0d0000"/>
  <rect x="16" y="18" width="64" height="64" rx="5" fill="#150000"/>
  <!-- Fire wings -->
  <polygon points="48,38 12,10 20,44" fill="#880e00" opacity="0.8"/>
  <polygon points="48,38 84,10 76,44" fill="#880e00" opacity="0.8"/>
  <polygon points="48,36 10,8 16,30" fill="#cc2200" opacity="0.5"/>
  <polygon points="48,36 86,8 80,30" fill="#cc2200" opacity="0.5"/>
  <!-- Void wings (overlapping) -->
  <polygon points="48,40 8,18 16,48" fill="#220044" opacity="0.5"/>
  <polygon points="48,40 88,18 80,48" fill="#220044" opacity="0.5"/>
  <!-- Main body - the Engine -->
  <rect x="22" y="24" width="52" height="56" rx="5" fill="#0d0000"/>
  <rect x="24" y="26" width="48" height="52" rx="4" fill="#160000"/>
  <!-- Central eye (combines fire + void) -->
  <circle cx="48" cy="50" r="18" fill="#080000"/>
  <circle cx="48" cy="50" r="14" fill="#220000"/>
  <!-- Eye iris - fire ring -->
  <circle cx="48" cy="50" r="12" fill="#440000"/>
  <circle cx="48" cy="50" r="10" fill="#660000"/>
  <circle cx="48" cy="50" r="8" fill="#880000"/>
  <circle cx="48" cy="50" r="6" fill="#aa0000"/>
  <!-- Eye pupil - void -->
  <circle cx="48" cy="50" r="4" fill="#000000"/>
  <circle cx="48" cy="50" r="3" fill="#110033"/>
  <!-- Eye slit -->
  <ellipse cx="48" cy="50" rx="1.5" ry="4" fill="#000000"/>
  <!-- Eye fire glow rings -->
  <circle cx="48" cy="50" r="18" fill="none" stroke="#ff2200" stroke-width="1.5" opacity="0.5"/>
  <circle cx="48" cy="50" r="14" fill="none" stroke="#ff4400" stroke-width="1" opacity="0.4"/>
  <!-- Void corruption marks on body -->
  <circle cx="48" cy="50" r="18" fill="none" stroke="#6600cc" stroke-width="1" opacity="0.3"/>
  <!-- Head - fusion of dragon + robot -->
  <rect x="28" y="10" width="40" height="18" rx="4" fill="#0d0000"/>
  <rect x="30" y="12" width="36" height="14" rx="3" fill="#160000"/>
  <!-- Dragon horns on robot head -->
  <polygon points="32,14 24,0 38,16" fill="#330000"/>
  <polygon points="64,14 72,0 58,16" fill="#330000"/>
  <!-- Inner horns -->
  <polygon points="38,12 34,2 42,14" fill="#1a0000"/>
  <polygon points="58,12 62,2 54,14" fill="#1a0000"/>
  <!-- Visor eye that glows red/purple -->
  <rect x="32" y="14" width="32" height="8" rx="2" fill="#000000"/>
  <rect x="33" y="15" width="30" height="6" rx="1" fill="#1a0000"/>
  <!-- Visor glow - split red/purple -->
  <rect x="33" y="16" width="14" height="4" fill="#ff2200" opacity="0.7"/>
  <rect x="49" y="16" width="14" height="4" fill="#6600cc" opacity="0.7"/>
  <line x1="48" y1="15" x2="48" y2="22" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <!-- Machine cannons on shoulders -->
  <rect x="14" y="26" width="12" height="10" rx="2" fill="#0d0000"/>
  <rect x="70" y="26" width="12" height="10" rx="2" fill="#0d0000"/>
  <circle cx="14" cy="31" r="3" fill="#ff2200" opacity="0.7"/>
  <circle cx="82" cy="31" r="3" fill="#6600cc" opacity="0.7"/>
  <!-- Lava cracks on body -->
  <path d="M 30 34 Q 34 42 30 50" fill="none" stroke="#ff3300" stroke-width="1.5" opacity="0.6"/>
  <path d="M 66 34 Q 62 42 66 50" fill="none" stroke="#ff3300" stroke-width="1.5" opacity="0.6"/>
  <path d="M 38 28 Q 42 36 40 44" fill="none" stroke="#ff5500" stroke-width="1" opacity="0.5"/>
  <!-- Ice crack overlay -->
  <path d="M 56 30 Q 60 38 58 46" fill="none" stroke="#44aaff" stroke-width="1" opacity="0.3"/>
  <!-- Void energy tendrils from body -->
  <path d="M 24 50 Q 14 56 12 66" fill="none" stroke="#440088" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M 72 50 Q 82 56 84 66" fill="none" stroke="#440088" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- Feet/base with fire -->
  <rect x="26" y="74" width="18" height="8" rx="2" fill="#0d0000"/>
  <rect x="52" y="74" width="18" height="8" rx="2" fill="#0d0000"/>
  <ellipse cx="35" cy="82" rx="10" ry="4" fill="#ff2200" opacity="0.4"/>
  <ellipse cx="61" cy="82" rx="10" ry="4" fill="#4400aa" opacity="0.4"/>
  <!-- Final boss outline pulse -->
  <rect x="22" y="24" width="52" height="56" rx="5" fill="none" stroke="#ff0000" stroke-width="1.5" opacity="0.4"/>
  <rect x="22" y="24" width="52" height="56" rx="5" fill="none" stroke="#6600cc" stroke-width="1" opacity="0.3"/>
</svg>
