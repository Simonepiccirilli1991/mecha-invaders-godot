<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Tidal Leviathan - Sea Serpent Boss -->
  <!-- Main body coil -->
  <ellipse cx="48" cy="52" rx="28" ry="20" fill="#042240" opacity="0.8"/>
  <!-- Tail coil -->
  <path d="M 20 52 Q 8 70 20 80 Q 32 90 48 82 Q 62 74 60 62" fill="none" stroke="#042240" stroke-width="14" stroke-linecap="round"/>
  <path d="M 20 52 Q 8 70 20 80 Q 32 90 48 82 Q 62 74 60 62" fill="none" stroke="#063060" stroke-width="10" stroke-linecap="round"/>
  <!-- Tail tip -->
  <polygon points="60,62 72,72 58,68" fill="#063060"/>
  <polygon points="60,62 70,78 56,72" fill="#042240"/>
  <!-- Neck -->
  <ellipse cx="48" cy="34" rx="12" ry="16" fill="#042240"/>
  <ellipse cx="48" cy="34" rx="9" ry="13" fill="#063060"/>
  <!-- Head -->
  <ellipse cx="48" cy="18" rx="18" ry="14" fill="#063060"/>
  <ellipse cx="48" cy="16" rx="14" ry="10" fill="#084080"/>
  <!-- Snout/jaw -->
  <ellipse cx="48" cy="24" rx="12" ry="6" fill="#042240"/>
  <line x1="36" y1="24" x2="60" y2="24" stroke="#0a60aa" stroke-width="1" opacity="0.6"/>
  <!-- Teeth -->
  <polygon points="40,20 38,28 42,20" fill="#aaddff" opacity="0.8"/>
  <polygon points="46,19 44,28 48,19" fill="#aaddff" opacity="0.8"/>
  <polygon points="52,19 50,28 54,19" fill="#aaddff" opacity="0.8"/>
  <polygon points="58,20 56,28 60,20" fill="#aaddff" opacity="0.8"/>
  <!-- Eyes - large serpentine -->
  <ellipse cx="40" cy="14" rx="6" ry="7" fill="#001122"/>
  <ellipse cx="56" cy="14" rx="6" ry="7" fill="#001122"/>
  <ellipse cx="40" cy="14" rx="4" ry="5" fill="#0066cc"/>
  <ellipse cx="56" cy="14" rx="4" ry="5" fill="#0066cc"/>
  <ellipse cx="40" cy="14" rx="2" ry="3" fill="#000000"/>
  <ellipse cx="56" cy="14" rx="2" ry="3" fill="#000000"/>
  <circle cx="41" cy="13" r="1" fill="#88ccff" opacity="0.8"/>
  <circle cx="57" cy="13" r="1" fill="#88ccff" opacity="0.8"/>
  <!-- Fins on head -->
  <polygon points="30,10 22,2 34,14" fill="#042240"/>
  <polygon points="32,8 24,0 36,12" fill="#063060" opacity="0.7"/>
  <polygon points="66,10 74,2 62,14" fill="#042240"/>
  <polygon points="64,8 72,0 60,12" fill="#063060" opacity="0.7"/>
  <!-- Back fins -->
  <polygon points="42,30 36,20 44,36" fill="#042240"/>
  <polygon points="54,30 60,20 52,36" fill="#042240"/>
  <!-- Scales shimmer -->
  <ellipse cx="48" cy="18" rx="18" ry="14" fill="none" stroke="#0a60aa" stroke-width="1" opacity="0.5"/>
  <!-- Belly lighter -->
  <ellipse cx="48" cy="52" rx="18" ry="10" fill="#0a4060" opacity="0.5"/>
  <!-- Tentacle feelers -->
  <path d="M 36 24 Q 20 30 16 42" fill="none" stroke="#063060" stroke-width="4" stroke-linecap="round"/>
  <path d="M 60 24 Q 76 30 80 42" fill="none" stroke="#063060" stroke-width="4" stroke-linecap="round"/>
  <circle cx="16" cy="42" r="3" fill="#0066cc" opacity="0.7"/>
  <circle cx="80" cy="42" r="3" fill="#0066cc" opacity="0.7"/>
</svg>
