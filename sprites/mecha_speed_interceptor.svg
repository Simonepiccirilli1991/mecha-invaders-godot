<?xml version="1.0" encoding="UTF-8"?>
<!-- PHANTOM - Speed Interceptor | SRW Style | Weapon: Twin Beam Sabers -->
<!-- Colors: White/Gray #ECEFF1/#CFD8DC + Orange #FF6F00/#FF8F00 + Gold accents -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" width="64" height="80">
  <defs>
    <!-- Saber blade gradient: deep orange at hilt → white-hot at tip -->
    <linearGradient id="ph_blade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#FF6F00"/>
      <stop offset="40%"  stop-color="#FFB300"/>
      <stop offset="80%"  stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="ph_armor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ECEFF1"/>
      <stop offset="100%" stop-color="#B0BEC5"/>
    </linearGradient>
    <linearGradient id="ph_wing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#CFD8DC"/>
      <stop offset="100%" stop-color="#78909C"/>
    </linearGradient>
  </defs>

  <!-- ===== SABER GLOW AURA (drawn first / deepest layer) ===== -->
  <ellipse cx="13"   cy="18" rx="8"  ry="23" fill="#FF8F00" opacity="0.10"/>
  <ellipse cx="51"   cy="18" rx="8"  ry="23" fill="#FF8F00" opacity="0.10"/>
  <ellipse cx="13"   cy="4"  rx="5"  ry="9"  fill="#FFFFFF"  opacity="0.08"/>
  <ellipse cx="51"   cy="4"  rx="5"  ry="9"  fill="#FFFFFF"  opacity="0.08"/>

  <!-- ===== BACK WINGS (behind torso) ===== -->
  <!-- Left wing — three-layer depth -->
  <polygon points="17,16  3,5   0,13  4,24  16,26" fill="#607D8B"/>
  <polygon points="17,17  5,7   3,14  7,23  16,25" fill="#78909C"/>
  <polygon points="17,18  8,9   6,15  9,22  16,24" fill="url(#ph_wing)"/>
  <!-- Wing orange edge stripe -->
  <line x1="5"  y1="7"  x2="8"  y2="22" stroke="#FF6F00" stroke-width="1" opacity="0.9"/>
  <!-- Right wing -->
  <polygon points="47,16 61,5  64,13 60,24 48,26" fill="#607D8B"/>
  <polygon points="47,17 59,7  61,14 57,23 48,25" fill="#78909C"/>
  <polygon points="47,18 56,9  58,15 55,22 48,24" fill="url(#ph_wing)"/>
  <line x1="59" y1="7"  x2="56" y2="22" stroke="#FF6F00" stroke-width="1" opacity="0.9"/>

  <!-- ===== BEAM SABER BLADES (beside body, pointing upward to tip at y=-4) ===== -->
  <!-- Left blade — outer glow halo -->
  <polygon points="9,39  18,39  17,1   10,1" fill="#FF8F00" opacity="0.20"/>
  <!-- Left blade — main body (tapers to point at tip) -->
  <polygon points="11.5,38  15.5,38  14.8,2  13.5,-4  12.2,2" fill="url(#ph_blade)"/>
  <!-- Left blade — bright inner core -->
  <polygon points="12.5,37  14.5,37  14.0,4  13.5,-2  13.0,4" fill="white" opacity="0.70"/>

  <!-- Right blade — outer glow halo -->
  <polygon points="46,39  55,39  54,1  47,1" fill="#FF8F00" opacity="0.20"/>
  <!-- Right blade — main body -->
  <polygon points="48.5,38  52.5,38  51.8,2  50.5,-4  49.2,2" fill="url(#ph_blade)"/>
  <!-- Right blade — bright inner core -->
  <polygon points="49.5,37  51.5,37  51.0,4  50.5,-2  50.0,4" fill="white" opacity="0.70"/>

  <!-- ===== TORSO ===== -->
  <!-- Main body -->
  <polygon points="18,14  46,14  44,38  20,38" fill="url(#ph_armor)"/>
  <!-- Left chest armor plate -->
  <polygon points="20,15  30,15  29,25  20,25" fill="#CFD8DC"/>
  <!-- Right chest armor plate -->
  <polygon points="44,15  34,15  35,25  44,25" fill="#CFD8DC"/>
  <!-- Center chest housing -->
  <rect x="26" y="15" width="12" height="11" rx="1" fill="#90A4AE"/>
  <!-- Power core (orange/gold) -->
  <rect x="28" y="17" width="8"  height="7"  rx="1.5" fill="#FF6F00"/>
  <rect x="29" y="18" width="6"  height="5"  rx="1"   fill="#FFB300"/>
  <rect x="30" y="19" width="4"  height="3"  rx="0.5" fill="#FFF9C4"/>
  <!-- Lower torso panel -->
  <rect x="21" y="27" width="22" height="5"  rx="0.5" fill="#B0BEC5"/>
  <rect x="23" y="28" width="8"  height="3"  rx="0.3" fill="#90A4AE"/>
  <rect x="33" y="28" width="8"  height="3"  rx="0.3" fill="#90A4AE"/>
  <!-- Waist armor belt -->
  <rect x="21" y="33" width="22" height="6"  rx="1"   fill="#78909C"/>
  <rect x="22" y="34" width="9"  height="4"  rx="0.5" fill="#546E7A"/>
  <rect x="33" y="34" width="9"  height="4"  rx="0.5" fill="#546E7A"/>
  <!-- Orange waist stripe accent -->
  <rect x="21" y="35.5" width="22" height="1.5" fill="#FF6F00" opacity="0.75"/>

  <!-- ===== HEAD ===== -->
  <!-- Wing-crest left fin (Wing Zero / Zeta inspired) -->
  <polygon points="27,5  18,-1  15,4  19,8  26,7" fill="#FF6F00"/>
  <polygon points="26,5.5  19,0  17,4.5  20,7.5  25,7" fill="#FFB300"/>
  <!-- Wing-crest right fin -->
  <polygon points="37,5  46,-1  49,4  45,8  38,7" fill="#FF6F00"/>
  <polygon points="38,5.5  45,0  47,4.5  44,7.5  39,7" fill="#FFB300"/>
  <!-- Gold V-forehead crest -->
  <polygon points="29,5  35,5  34,2  30,2" fill="#FFD740"/>
  <polygon points="30,5  34,5  33,3  31,3" fill="white" opacity="0.8"/>
  <!-- Head main box -->
  <rect x="22" y="5"   width="20" height="9"   rx="1"   fill="#ECEFF1"/>
  <!-- Top ridge plate -->
  <rect x="23" y="5"   width="18" height="2.5" rx="0.5" fill="#CFD8DC"/>
  <!-- Eye visor band (dark) -->
  <rect x="23" y="8.5" width="18" height="3.5" rx="0.5" fill="#1A237E"/>
  <!-- Left eye sensor -->
  <rect x="24" y="9"   width="6"  height="2.5" rx="0.3" fill="#FF6F00"/>
  <rect x="25" y="9.5" width="4"  height="1.5" rx="0.2" fill="#FFD740"/>
  <!-- Right eye sensor -->
  <rect x="34" y="9"   width="6"  height="2.5" rx="0.3" fill="#FF6F00"/>
  <rect x="35" y="9.5" width="4"  height="1.5" rx="0.2" fill="#FFD740"/>
  <!-- Nose bridge divider -->
  <rect x="30" y="9"   width="4"  height="2.5" fill="#1A237E"/>
  <!-- Chin plate -->
  <rect x="24" y="13"  width="16" height="1.5" rx="0.5" fill="#90A4AE"/>
  <!-- Head side panels -->
  <rect x="22" y="6"   width="2"  height="7"   rx="0.5" fill="#90A4AE"/>
  <rect x="40" y="6"   width="2"  height="7"   rx="0.5" fill="#90A4AE"/>

  <!-- ===== LEFT ARM ===== -->
  <!-- Shoulder pauldron (swept aerodynamic shape) -->
  <polygon points="10,13  19,13  18,21  9,23" fill="#CFD8DC"/>
  <polygon points="11,14  18,14  17,20  10,22" fill="#ECEFF1"/>
  <!-- Shoulder orange accent stripe -->
  <rect x="10" y="16"  width="8"  height="1.5" rx="0.3" fill="#FF6F00"/>
  <!-- Upper arm -->
  <rect x="11" y="23"  width="7"  height="9"   rx="1"   fill="#ECEFF1"/>
  <rect x="12" y="24"  width="5"  height="7"   rx="0.5" fill="#CFD8DC"/>
  <!-- Elbow joint -->
  <rect x="10.5" y="32" width="8"  height="3"   rx="1"   fill="#78909C"/>
  <!-- Forearm -->
  <rect x="11" y="35"  width="7"  height="4"   rx="1"   fill="#CFD8DC"/>
  <!-- Wrist collar -->
  <rect x="10.5" y="38.5" width="8" height="1.5" rx="0.5" fill="#FF6F00"/>
  <!-- Saber hilt cross-guard -->
  <rect x="9.5" y="38"  width="10" height="2"   rx="0.5" fill="#FF8F00"/>
  <!-- Hilt body (dark grip) -->
  <rect x="11" y="39"  width="7"  height="5"   rx="0.5" fill="#37474F"/>
  <rect x="12" y="40"  width="5"  height="3.5" rx="0.3" fill="#263238"/>
  <!-- Grip ridges -->
  <rect x="12.5" y="40.5" width="4" height="0.7" rx="0.2" fill="#546E7A"/>
  <rect x="12.5" y="41.8" width="4" height="0.7" rx="0.2" fill="#546E7A"/>
  <rect x="12.5" y="43.1" width="4" height="0.7" rx="0.2" fill="#546E7A"/>
  <!-- Hilt end cap -->
  <rect x="11"   y="43.5" width="7" height="1"   rx="0.3" fill="#546E7A"/>

  <!-- ===== RIGHT ARM ===== -->
  <!-- Shoulder pauldron -->
  <polygon points="54,13  45,13  46,21  55,23" fill="#CFD8DC"/>
  <polygon points="53,14  46,14  47,20  54,22" fill="#ECEFF1"/>
  <rect x="46" y="16"  width="8"  height="1.5" rx="0.3" fill="#FF6F00"/>
  <!-- Upper arm -->
  <rect x="46" y="23"  width="7"  height="9"   rx="1"   fill="#ECEFF1"/>
  <rect x="47" y="24"  width="5"  height="7"   rx="0.5" fill="#CFD8DC"/>
  <!-- Elbow joint -->
  <rect x="45.5" y="32" width="8"  height="3"   rx="1"   fill="#78909C"/>
  <!-- Forearm -->
  <rect x="46" y="35"  width="7"  height="4"   rx="1"   fill="#CFD8DC"/>
  <!-- Wrist collar -->
  <rect x="45.5" y="38.5" width="8" height="1.5" rx="0.5" fill="#FF6F00"/>
  <!-- Saber hilt cross-guard -->
  <rect x="44.5" y="38" width="10" height="2"   rx="0.5" fill="#FF8F00"/>
  <!-- Hilt body -->
  <rect x="46" y="39"  width="7"  height="5"   rx="0.5" fill="#37474F"/>
  <rect x="47" y="40"  width="5"  height="3.5" rx="0.3" fill="#263238"/>
  <!-- Grip ridges -->
  <rect x="47.5" y="40.5" width="4" height="0.7" rx="0.2" fill="#546E7A"/>
  <rect x="47.5" y="41.8" width="4" height="0.7" rx="0.2" fill="#546E7A"/>
  <rect x="47.5" y="43.1" width="4" height="0.7" rx="0.2" fill="#546E7A"/>
  <rect x="46"   y="43.5" width="7" height="1"   rx="0.3" fill="#546E7A"/>

  <!-- ===== LEGS ===== -->
  <!-- Hip joints -->
  <rect x="20" y="37"  width="11" height="8"  rx="1" fill="#78909C"/>
  <rect x="33" y="37"  width="11" height="8"  rx="1" fill="#78909C"/>

  <!-- Left leg -->
  <rect x="20" y="45"  width="11" height="12" rx="1"   fill="#ECEFF1"/>
  <rect x="21" y="46"  width="9"  height="10" rx="0.5" fill="#CFD8DC"/>
  <!-- Left thigh orange accent -->
  <rect x="28" y="46"  width="2"  height="9"  rx="0.3" fill="#FF6F00" opacity="0.80"/>
  <!-- Left knee guard -->
  <rect x="19" y="57"  width="13" height="5"  rx="1"   fill="#78909C"/>
  <rect x="20" y="58"  width="11" height="3"  rx="0.5" fill="#546E7A"/>
  <!-- Left shin -->
  <rect x="20" y="62"  width="11" height="11" rx="1"   fill="#ECEFF1"/>
  <rect x="21" y="63"  width="9"  height="9"  rx="0.5" fill="#CFD8DC"/>
  <!-- Left shin orange accent -->
  <rect x="28" y="63"  width="2"  height="8"  rx="0.3" fill="#FF6F00" opacity="0.80"/>
  <!-- Left foot -->
  <rect x="19" y="73"  width="13" height="4"  rx="1"   fill="#90A4AE"/>
  <rect x="18" y="75"  width="15" height="3"  rx="1"   fill="#78909C"/>

  <!-- Right leg -->
  <rect x="33" y="45"  width="11" height="12" rx="1"   fill="#ECEFF1"/>
  <rect x="34" y="46"  width="9"  height="10" rx="0.5" fill="#CFD8DC"/>
  <!-- Right thigh orange accent -->
  <rect x="34" y="46"  width="2"  height="9"  rx="0.3" fill="#FF6F00" opacity="0.80"/>
  <!-- Right knee guard -->
  <rect x="32" y="57"  width="13" height="5"  rx="1"   fill="#78909C"/>
  <rect x="33" y="58"  width="11" height="3"  rx="0.5" fill="#546E7A"/>
  <!-- Right shin -->
  <rect x="33" y="62"  width="11" height="11" rx="1"   fill="#ECEFF1"/>
  <rect x="34" y="63"  width="9"  height="9"  rx="0.5" fill="#CFD8DC"/>
  <!-- Right shin orange accent -->
  <rect x="34" y="63"  width="2"  height="8"  rx="0.3" fill="#FF6F00" opacity="0.80"/>
  <!-- Right foot -->
  <rect x="32" y="73"  width="13" height="4"  rx="1"   fill="#90A4AE"/>
  <rect x="31" y="75"  width="15" height="3"  rx="1"   fill="#78909C"/>
</svg>
