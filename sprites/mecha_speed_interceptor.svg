<?xml version="1.0" encoding="UTF-8"?>
<!-- GETTER RED — The Speed Demon | Inspired by Getter Robo / Combattler V -->
<!-- Vivid Red #D32F2F · Pure White #FAFAFA · Jet Black · Flame Orange #FF6D00 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" width="80" height="100">

  <!-- SPEED BOOST FLAMES (behind legs) -->
  <ellipse cx="23" cy="95" rx="6"  ry="4"  fill="#FF6D00" opacity="0.55"/>
  <ellipse cx="23" cy="97" rx="4"  ry="2"  fill="#FF9800" opacity="0.6"/>
  <ellipse cx="57" cy="95" rx="6"  ry="4"  fill="#FF6D00" opacity="0.55"/>
  <ellipse cx="57" cy="97" rx="4"  ry="2"  fill="#FF9800" opacity="0.6"/>

  <!-- FEET (swept, aerodynamic) -->
  <polygon points="13,88 33,88 35,97 11,97" fill="#0D0D0D"/>
  <polygon points="14,89 32,89 34,96 12,96" fill="#1A1A1A"/>
  <rect x="16" y="92" width="12" height="2" fill="#D32F2F"/>
  <polygon points="47,88 67,88 69,97 45,97" fill="#0D0D0D"/>
  <polygon points="48,89 66,89 68,96 46,96" fill="#1A1A1A"/>
  <rect x="50" y="92" width="12" height="2" fill="#D32F2F"/>

  <!-- FIN BOOSTERS on ankles -->
  <polygon points="10,85 13,88 13,92 8,90"  fill="#D32F2F"/>
  <polygon points="70,85 67,88 67,92 72,90"  fill="#D32F2F"/>

  <!-- SHINS (streamlined, tapers forward) -->
  <path d="M 16 67 L 14 88 L 32 88 L 31 67 Z" fill="#FAFAFA"/>
  <path d="M 17 68 L 15 87 L 31 87 L 30 68 Z" fill="#FAFAFA"/>
  <!-- Red shin stripe accent -->
  <rect x="16" y="70" width="14" height="4"  rx="0.5" fill="#D32F2F"/>
  <rect x="16" y="76" width="14" height="2"  rx="0.5" fill="#D32F2F" opacity="0.6"/>
  <!-- Panel line -->
  <line x1="23" y1="68" x2="23" y2="87" stroke="#E0E0E0" stroke-width="0.6"/>
  <path d="M 64 67 L 66 88 L 48 88 L 49 67 Z" fill="#FAFAFA"/>
  <path d="M 63 68 L 65 87 L 49 87 L 50 68 Z" fill="#FAFAFA"/>
  <rect x="50" y="70" width="14" height="4"  rx="0.5" fill="#D32F2F"/>
  <rect x="50" y="76" width="14" height="2"  rx="0.5" fill="#D32F2F" opacity="0.6"/>
  <line x1="57" y1="68" x2="57" y2="87" stroke="#E0E0E0" stroke-width="0.6"/>

  <!-- KNEES (angular, forward-pointing) -->
  <polygon points="13,62 21,61 31,67 21,67" fill="#D32F2F"/>
  <polygon points="14,63 21,62 30,67 21,66" fill="#EF5350"/>
  <polygon points="67,62 59,61 49,67 59,67" fill="#D32F2F"/>
  <polygon points="66,63 59,62 50,67 59,66" fill="#EF5350"/>

  <!-- THIGHS (white with red panel) -->
  <rect x="14" y="50" width="18" height="13" rx="1" fill="#FAFAFA"/>
  <rect x="15" y="51" width="16" height="11" rx="1" fill="#FAFAFA"/>
  <rect x="15" y="52" width="14" height="4"  rx="0.5" fill="#D32F2F"/>
  <rect x="48" y="50" width="18" height="13" rx="1" fill="#FAFAFA"/>
  <rect x="49" y="51" width="16" height="11" rx="1" fill="#FAFAFA"/>
  <rect x="49" y="52" width="14" height="4"  rx="0.5" fill="#D32F2F"/>

  <!-- WAIST / SKIRT (red belt with white side vanes) -->
  <rect x="18" y="46" width="44" height="6"  rx="1" fill="#D32F2F"/>
  <rect x="20" y="47" width="40" height="4"  rx="0.5" fill="#E53935"/>
  <!-- Side vane fins -->
  <polygon points="16,46 12,54 18,52" fill="#FAFAFA"/>
  <polygon points="64,46 68,54 62,52" fill="#FAFAFA"/>
  <!-- Center circle -->
  <circle cx="40" cy="49" r="3.5" fill="#0D0D0D"/>
  <circle cx="40" cy="49" r="2"   fill="#FF6D00"/>
  <circle cx="40" cy="49" r="1"   fill="#FAFAFA"/>

  <!-- TORSO (aerodynamic, sleek red/white split) -->
  <!-- White chest panel -->
  <polygon points="18,20 62,20 64,46 16,46" fill="#FAFAFA"/>
  <polygon points="20,21 60,21 62,45 18,45" fill="#FAFAFA"/>
  <!-- Red torso upper half -->
  <polygon points="14,20 66,20 64,32 16,32" fill="#D32F2F"/>
  <polygon points="15,21 65,21 63,31 17,31" fill="#E53935"/>
  <!-- Chest V-stripe (red on white) -->
  <polygon points="34,32 46,32 44,46 36,46" fill="#D32F2F"/>
  <polygon points="35,33 45,33 43,45 37,45" fill="#E53935"/>
  <!-- Left speed vent -->
  <rect x="16" y="33" width="6"  height="10" rx="0.5" fill="#0D0D0D"/>
  <rect x="17" y="34" width="4"  height="2.5" fill="#FF6D00" opacity="0.9"/>
  <rect x="17" y="38" width="4"  height="2.5" fill="#FF6D00" opacity="0.7"/>
  <!-- Right speed vent -->
  <rect x="58" y="33" width="6"  height="10" rx="0.5" fill="#0D0D0D"/>
  <rect x="59" y="34" width="4"  height="2.5" fill="#FF6D00" opacity="0.9"/>
  <rect x="59" y="38" width="4"  height="2.5" fill="#FF6D00" opacity="0.7"/>
  <!-- Central cockpit circle -->
  <circle cx="40" cy="25" r="5"   fill="#0D0D0D"/>
  <circle cx="40" cy="25" r="3.5" fill="#FF6D00"/>
  <circle cx="40" cy="25" r="2"   fill="#FAFAFA"/>

  <!-- SHOULDERS (swept back wing-pods) -->
  <!-- Left wing-shoulder -->
  <polygon points="14,16 4,20 2,34 12,38 16,20" fill="#D32F2F"/>
  <polygon points="15,17 5,21 3,33 11,37 15,21" fill="#E53935"/>
  <!-- Wing panel -->
  <polygon points="4,20 -2,26 2,34"  fill="#FAFAFA" opacity="0.7"/>
  <!-- Right wing-shoulder -->
  <polygon points="66,16 76,20 78,34 68,38 64,20" fill="#D32F2F"/>
  <polygon points="65,17 75,21 77,33 69,37 65,21" fill="#E53935"/>
  <polygon points="76,20 82,26 78,34"  fill="#FAFAFA" opacity="0.7"/>

  <!-- LEFT ARM (energy saber arm) -->
  <rect x="4"  y="32" width="12" height="12" rx="1" fill="#D32F2F"/>
  <rect x="5"  y="33" width="10" height="10" rx="1" fill="#E53935"/>
  <rect x="3"  y="44" width="14" height="4"  rx="1.5" fill="#0D0D0D"/>
  <rect x="3"  y="48" width="12" height="11" rx="1" fill="#D32F2F"/>
  <rect x="4"  y="49" width="10" height="9"  rx="1" fill="#E53935"/>
  <rect x="5"  y="51" width="6"  height="2"  fill="#FAFAFA"/>
  <!-- Fist + saber -->
  <rect x="3"  y="59" width="12" height="8"  rx="2" fill="#0D0D0D"/>
  <!-- BEAM SABER BLADE (left — pointing up diagonally) -->
  <rect x="0"  y="20" width="5" height="28" rx="1" fill="#37474F"/>
  <rect x="1"  y="21" width="3" height="26" fill="#546E7A"/>
  <polygon points="-1,18 3,10 7,18" fill="#FAFAFA"/>
  <polygon points="0,18  3,12  6,18" fill="#FF6D00"/>
  <rect x="0"  y="14" width="6" height="5" fill="#FF9800" opacity="0.8"/>
  <ellipse cx="3" cy="12" rx="2" ry="1.5" fill="#FFD740" opacity="0.9"/>

  <!-- RIGHT ARM (second saber arm) -->
  <rect x="64" y="32" width="12" height="12" rx="1" fill="#D32F2F"/>
  <rect x="65" y="33" width="10" height="10" rx="1" fill="#E53935"/>
  <rect x="63" y="44" width="14" height="4"  rx="1.5" fill="#0D0D0D"/>
  <rect x="65" y="48" width="12" height="11" rx="1" fill="#D32F2F"/>
  <rect x="66" y="49" width="10" height="9"  rx="1" fill="#E53935"/>
  <rect x="67" y="51" width="6"  height="2"  fill="#FAFAFA"/>
  <rect x="65" y="59" width="12" height="8"  rx="2" fill="#0D0D0D"/>
  <!-- BEAM SABER BLADE (right) -->
  <rect x="75" y="20" width="5" height="28" rx="1" fill="#37474F"/>
  <rect x="76" y="21" width="3" height="26" fill="#546E7A"/>
  <polygon points="74,18 77,10 81,18" fill="#FAFAFA"/>
  <polygon points="75,18 77,12 79,18" fill="#FF6D00"/>
  <rect x="74" y="14" width="6" height="5" fill="#FF9800" opacity="0.8"/>
  <ellipse cx="77" cy="12" rx="2" ry="1.5" fill="#FFD740" opacity="0.9"/>

  <!-- NECK -->
  <rect x="33" y="16" width="14" height="5" rx="1" fill="#D32F2F"/>
  <rect x="34" y="17" width="12" height="3" rx="0.5" fill="#E53935"/>

  <!-- HEAD (sleek aerodynamic — Getter Robo style) -->
  <rect x="22" y="5"  width="36" height="12" rx="2" fill="#D32F2F"/>
  <rect x="23" y="6"  width="34" height="10" rx="1" fill="#E53935"/>
  <!-- White forehead plate -->
  <rect x="24" y="6"  width="32" height="4"  rx="0.5" fill="#FAFAFA"/>
  <!-- VISOR (narrow slash — speed) -->
  <rect x="24" y="11" width="32" height="3"  rx="0.5" fill="#0D0D0D"/>
  <rect x="25" y="11.5" width="30" height="2" rx="0.3" fill="#FF6D00"/>
  <rect x="28" y="12"   width="24" height="1" fill="#FFD740" opacity="0.7"/>
  <!-- Chin -->
  <rect x="26" y="15" width="28" height="2"  rx="0.5" fill="#D32F2F"/>
  <!-- Side ear guards -->
  <rect x="19" y="8"  width="5" height="7"   rx="0.5" fill="#0D0D0D"/>
  <rect x="56" y="8"  width="5" height="7"   rx="0.5" fill="#0D0D0D"/>
  <!-- LONG CREST ANTENNA (Getter Robo style — swept back) -->
  <polygon points="30,5 36,5 32,-1 26,1"  fill="#FAFAFA"/>
  <polygon points="50,5 44,5 48,-1 54,1"  fill="#FAFAFA"/>
  <!-- Center tall spike -->
  <rect x="38" y="-4" width="4"  height="10" rx="0.5" fill="#D32F2F"/>
  <polygon points="37,-4 43,-4 40,-9" fill="#FF6D00"/>
  <circle cx="40" cy="-8" r="1.5" fill="#FFD740"/>
</svg>
