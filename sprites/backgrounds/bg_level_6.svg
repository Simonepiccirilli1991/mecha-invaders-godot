<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" width="1440" height="960">
  <defs>
    <linearGradient id="sky6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050008"/>
      <stop offset="35%" stop-color="#0d0018"/>
      <stop offset="65%" stop-color="#180030"/>
      <stop offset="100%" stop-color="#1a0a28"/>
    </linearGradient>
    <linearGradient id="ground6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#100520"/>
      <stop offset="100%" stop-color="#060010"/>
    </linearGradient>
    <radialGradient id="toxicglow6" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44ff44" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#44ff44" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="purpleglow6" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#aa22ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#aa22ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1440" height="960" fill="url(#sky6)"/>

  <!-- Toxic horizon glow -->
  <ellipse cx="720" cy="770" rx="900" ry="240" fill="#1a0044" opacity="0.6"/>
  <ellipse cx="720" cy="800" rx="650" ry="160" fill="#330066" opacity="0.4"/>
  <ellipse cx="720" cy="820" rx="500" ry="100" fill="#44ff44" opacity="0.12"/>

  <!-- Stars (sickly purple) -->
  <g fill="#cc88ff" opacity="0.3">
    <circle cx="55" cy="30" r="1.3"/><circle cx="170" cy="18" r="1"/><circle cx="305" cy="50" r="1.5"/>
    <circle cx="460" cy="20" r="1.1"/><circle cx="620" cy="45" r="1.3"/><circle cx="790" cy="28" r="1"/>
    <circle cx="960" cy="52" r="1.5"/><circle cx="1120" cy="22" r="1.1"/><circle cx="1290" cy="48" r="1.3"/>
    <circle cx="1420" cy="16" r="1"/><circle cx="130" cy="88" r="1.1"/><circle cx="390" cy="100" r="1.3"/>
    <circle cx="680" cy="80" r="1"/><circle cx="990" cy="96" r="1.5"/><circle cx="1260" cy="76" r="1.1"/>
  </g>

  <!-- Toxic spore clouds -->
  <g fill="#0d0018" opacity="0.8">
    <ellipse cx="100" cy="180" rx="210" ry="100"/>
    <ellipse cx="360" cy="145" rx="235" ry="108"/>
    <ellipse cx="630" cy="168" rx="248" ry="102"/>
    <ellipse cx="890" cy="140" rx="228" ry="106"/>
    <ellipse cx="1140" cy="162" rx="242" ry="98"/>
    <ellipse cx="1370" cy="182" rx="198" ry="94"/>
    <ellipse cx="245" cy="268" rx="190" ry="82"/>
    <ellipse cx="760" cy="252" rx="215" ry="85"/>
    <ellipse cx="1260" cy="265" rx="200" ry="80"/>
  </g>
  <!-- Purple-green tinted top of clouds -->
  <g opacity="0.2">
    <ellipse cx="100" cy="160" rx="210" ry="70" fill="#6600aa"/>
    <ellipse cx="360" cy="125" rx="235" ry="75" fill="#44aa00"/>
    <ellipse cx="630" cy="148" rx="248" ry="72" fill="#6600aa"/>
    <ellipse cx="890" cy="120" rx="228" ry="74" fill="#44aa00"/>
    <ellipse cx="1140" cy="142" rx="242" ry="70" fill="#6600aa"/>
    <ellipse cx="1370" cy="162" rx="198" ry="68" fill="#44aa00"/>
  </g>

  <!-- Ground -->
  <rect y="760" width="1440" height="200" fill="url(#ground6)"/>

  <!-- Corrupted terrain bumps -->
  <g fill="#0d0522">
    <ellipse cx="180" cy="762" rx="240" ry="35"/>
    <ellipse cx="560" cy="768" rx="280" ry="32"/>
    <ellipse cx="960" cy="760" rx="260" ry="38"/>
    <ellipse cx="1320" cy="766" rx="220" ry="30"/>
  </g>

  <!-- Twisted/corrupted structures -->
  <g fill="#0a0018">
    <!-- Warped buildings -->
    <rect x="70" y="620" width="45" height="145" transform="skewX(3)"/>
    <rect x="65" y="620" width="55" height="12" transform="skewX(3)"/>
    <rect x="200" y="640" width="38" height="125" transform="skewX(-2)"/>
    <rect x="380" y="610" width="50" height="155" transform="skewX(4)"/>
    <rect x="375" y="610" width="60" height="12" transform="skewX(4)"/>
    <rect x="560" y="625" width="42" height="140" transform="skewX(-3)"/>
    <rect x="740" y="605" width="55" height="160" transform="skewX(2)"/>
    <rect x="735" y="605" width="65" height="12" transform="skewX(2)"/>
    <rect x="920" y="630" width="40" height="135" transform="skewX(-4)"/>
    <rect x="1080" y="615" width="52" height="150" transform="skewX(3)"/>
    <rect x="1075" y="615" width="62" height="12" transform="skewX(3)"/>
    <rect x="1250" y="638" width="38" height="127" transform="skewX(-2)"/>
    <rect x="1380" y="622" width="48" height="143" transform="skewX(5)"/>
  </g>

  <!-- Toxic spore bubbles floating -->
  <g opacity="0.4">
    <circle cx="150" cy="450" r="18" fill="none" stroke="#44ff22" stroke-width="2"/>
    <circle cx="150" cy="450" r="8" fill="#22aa11" opacity="0.3"/>
    <circle cx="380" cy="420" r="14" fill="none" stroke="#22ff44" stroke-width="1.5"/>
    <circle cx="380" cy="420" r="6" fill="#11aa22" opacity="0.3"/>
    <circle cx="600" cy="465" r="20" fill="none" stroke="#44ff22" stroke-width="2"/>
    <circle cx="600" cy="465" r="9" fill="#22aa11" opacity="0.3"/>
    <circle cx="850" cy="435" r="16" fill="none" stroke="#22ff44" stroke-width="1.5"/>
    <circle cx="850" cy="435" r="7" fill="#11aa22" opacity="0.3"/>
    <circle cx="1050" cy="455" r="22" fill="none" stroke="#44ff22" stroke-width="2"/>
    <circle cx="1050" cy="455" r="10" fill="#22aa11" opacity="0.3"/>
    <circle cx="1280" cy="440" r="15" fill="none" stroke="#22ff44" stroke-width="1.5"/>
    <circle cx="1280" cy="440" r="6" fill="#11aa22" opacity="0.3"/>
    <circle cx="280" cy="530" r="12" fill="none" stroke="#aa44ff" stroke-width="1.5"/>
    <circle cx="280" cy="530" r="5" fill="#6622aa" opacity="0.3"/>
    <circle cx="500" cy="510" r="17" fill="none" stroke="#aa44ff" stroke-width="2"/>
    <circle cx="500" cy="510" r="7" fill="#6622aa" opacity="0.3"/>
    <circle cx="720" cy="525" r="13" fill="none" stroke="#aa44ff" stroke-width="1.5"/>
    <circle cx="720" cy="525" r="5" fill="#6622aa" opacity="0.3"/>
    <circle cx="940" cy="515" r="19" fill="none" stroke="#aa44ff" stroke-width="2"/>
    <circle cx="940" cy="515" r="8" fill="#6622aa" opacity="0.3"/>
    <circle cx="1160" cy="528" r="14" fill="none" stroke="#aa44ff" stroke-width="1.5"/>
    <circle cx="1160" cy="528" r="6" fill="#6622aa" opacity="0.3"/>
    <circle cx="1380" cy="518" r="16" fill="none" stroke="#aa44ff" stroke-width="2"/>
  </g>

  <!-- Ground toxic puddles -->
  <g opacity="0.5">
    <ellipse cx="200" cy="810" rx="90" ry="25" fill="url(#toxicglow6)"/>
    <ellipse cx="200" cy="810" rx="45" ry="12" fill="#22ff22" opacity="0.25"/>
    <ellipse cx="600" cy="820" rx="110" ry="28" fill="url(#purpleglow6)"/>
    <ellipse cx="600" cy="820" rx="55" ry="14" fill="#aa22ff" opacity="0.2"/>
    <ellipse cx="1000" cy="808" rx="95" ry="26" fill="url(#toxicglow6)"/>
    <ellipse cx="1000" cy="808" rx="48" ry="13" fill="#22ff22" opacity="0.22"/>
    <ellipse cx="1350" cy="815" rx="85" ry="24" fill="url(#purpleglow6)"/>
    <ellipse cx="1350" cy="815" rx="42" ry="12" fill="#aa22ff" opacity="0.18"/>
  </g>

  <!-- Floating toxic mist -->
  <ellipse cx="720" cy="750" rx="900" ry="100" fill="#1a0044" opacity="0.3"/>
  <ellipse cx="360" cy="700" rx="400" ry="60" fill="#002200" opacity="0.25"/>
  <ellipse cx="1100" cy="710" rx="380" ry="55" fill="#002200" opacity="0.22"/>

  <!-- Spore/particle drift -->
  <g fill="#88ff44" opacity="0.25">
    <circle cx="100" cy="400" r="2"/><circle cx="220" cy="430" r="1.5"/><circle cx="380" cy="408" r="2"/>
    <circle cx="520" cy="440" r="1.5"/><circle cx="680" cy="415" r="2"/><circle cx="840" cy="442" r="1.5"/>
    <circle cx="1000" cy="418" r="2"/><circle cx="1160" cy="435" r="1.5"/><circle cx="1320" cy="410" r="2"/>
  </g>
</svg>
