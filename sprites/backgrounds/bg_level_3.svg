    <rect x="75" y="480" width="60" height="12"/><!-- ledge -->
    <rect x="180" y="520" width="40" height="105"/>
    <rect x="320" y="495" width="55" height="130"/>
    <rect x="315" y="495" width="65" height="12"/>
    <rect x="460" y="505" width="45" height="120"/>
    <rect x="580" y="475" width="62" height="150"/>
    <rect x="575" y="475" width="72" height="12"/>
    <rect x="710" y="510" width="42" height="115"/>
    <rect x="830" y="488" width="58" height="137"/>
    <rect x="825" y="488" width="68" height="12"/>
    <rect x="960" y="498" width="48" height="127"/>
    <rect x="1080" y="478" width="60" height="147"/>
    <rect x="1075" y="478" width="70" height="12"/>
    <rect x="1210" y="505" width="44" height="120"/>
    <rect x="1330" y="490" width="55" height="135"/>
    <rect x="1325" y="490" width="65" height="12"/>
