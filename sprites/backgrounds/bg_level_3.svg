<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" width="1440" height="960">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020308"/>
      <stop offset="35%" stop-color="#04081a"/>
      <stop offset="65%" stop-color="#071428"/>
      <stop offset="100%" stop-color="#0d1e38"/>
    </linearGradient>
    <linearGradient id="water3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#061428"/>
      <stop offset="50%" stop-color="#030d1e"/>
      <stop offset="100%" stop-color="#010508"/>
    </linearGradient>
    <linearGradient id="lightning3" x1="0" y1="0" x2="0.1" y2="1">
      <stop offset="0%" stop-color="#aaccff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#aaccff" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1440" height="960" fill="url(#sky3)"/>

  <!-- Storm clouds -->
  <g fill="#06091a" opacity="0.9">
    <ellipse cx="100" cy="150" rx="220" ry="100"/>
    <ellipse cx="340" cy="120" rx="250" ry="110"/>
    <ellipse cx="600" cy="145" rx="260" ry="105"/>
    <ellipse cx="860" cy="115" rx="240" ry="108"/>
    <ellipse cx="1110" cy="140" rx="255" ry="102"/>
    <ellipse cx="1350" cy="160" rx="210" ry="95"/>
    <ellipse cx="230" cy="230" rx="180" ry="80"/>
    <ellipse cx="720" cy="220" rx="200" ry="85"/>
    <ellipse cx="1220" cy="235" rx="190" ry="80"/>
  </g>
  <g fill="#080c22" opacity="0.8">
    <ellipse cx="150" cy="280" rx="240" ry="90"/>
    <ellipse cx="450" cy="260" rx="260" ry="95"/>
    <ellipse cx="750" cy="275" rx="250" ry="88"/>
    <ellipse cx="1050" cy="258" rx="245" ry="92"/>
    <ellipse cx="1330" cy="280" rx="220" ry="88"/>
  </g>

  <!-- Moon through clouds -->
  <circle cx="1100" cy="120" r="55" fill="#0a1428" opacity="0.8"/>
  <circle cx="1100" cy="120" r="48" fill="#1a2845" opacity="0.5"/>
  <circle cx="1100" cy="120" r="42" fill="#223355" opacity="0.3"/>

  <!-- Lightning bolts -->
  <g fill="none" stroke="#8aadee" stroke-width="2" opacity="0.6">
    <polyline points="280,220 265,290 278,290 258,380"/>
    <polyline points="900,240 888,310 900,310 882,400"/>
    <polyline points="1180,200 1168,270 1180,270 1162,365"/>
  </g>
  <g fill="none" stroke="#c8deff" stroke-width="1" opacity="0.4">
    <polyline points="282,220 267,292 280,292 260,382"/>
    <polyline points="902,240 890,312 902,312 884,402"/>
  </g>

  <!-- Water surface -->
  <rect y="620" width="1440" height="340" fill="url(#water3)"/>

  <!-- Water ripples / waves -->
  <g fill="none" stroke="#0d2244" stroke-width="2" opacity="0.6">
    <ellipse cx="200" cy="650" rx="120" ry="15"/>
    <ellipse cx="500" cy="665" rx="150" ry="18"/>
    <ellipse cx="800" cy="648" rx="130" ry="14"/>
    <ellipse cx="1100" cy="660" rx="145" ry="17"/>
    <ellipse cx="1350" cy="652" rx="110" ry="13"/>
    <ellipse cx="350" cy="700" rx="160" ry="20"/>
    <ellipse cx="700" cy="710" rx="140" ry="18"/>
    <ellipse cx="1000" cy="695" rx="155" ry="19"/>
    <ellipse cx="1280" cy="705" rx="125" ry="16"/>
