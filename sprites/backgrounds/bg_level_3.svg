  <!-- Flooded window reflections -->
  <g fill="#0d2244" opacity="0.6">
    <rect x="85" y="490" width="8" height="10"/><rect x="96" y="490" width="8" height="10"/>
    <rect x="85" y="508" width="8" height="10"/><rect x="96" y="508" width="8" height="10"/>
    <rect x="325" y="505" width="9" height="11"/><rect x="337" y="505" width="9" height="11"/>
    <rect x="325" y="520" width="9" height="11"/><rect x="337" y="520" width="9" height="11"/>
    <rect x="585" y="488" width="10" height="12"/><rect x="598" y="488" width="10" height="12"/>
    <rect x="585" y="504" width="10" height="12"/><rect x="598" y="504" width="10" height="12"/>
    <rect x="835" y="498" width="9" height="11"/><rect x="847" y="498" width="9" height="11"/>
    <rect x="1085" y="490" width="10" height="12"/><rect x="1098" y="490" width="10" height="12"/>
    <rect x="1335" y="500" width="9" height="11"/><rect x="1347" y="500" width="9" height="11"/>
  </g>

  <!-- Rain streaks -->
  <g stroke="#1a3366" stroke-width="1" opacity="0.35">
    <line x1="50" y1="300" x2="42" y2="380"/>
    <line x1="130" y1="280" x2="122" y2="360"/>
    <line x1="220" y1="310" x2="212" y2="390"/>
    <line x1="310" y1="295" x2="302" y2="375"/>
    <line x1="400" y1="315" x2="392" y2="395"/>
    <line x1="490" y1="285" x2="482" y2="365"/>
    <line x1="580" y1="305" x2="572" y2="385"/>
    <line x1="670" y1="290" x2="662" y2="370"/>
    <line x1="760" y1="310" x2="752" y2="390"/>
    <line x1="850" y1="280" x2="842" y2="360"/>
    <line x1="940" y1="300" x2="932" y2="380"/>
    <line x1="1030" y1="285" x2="1022" y2="365"/>
    <line x1="1120" y1="315" x2="1112" y2="395"/>
    <line x1="1210" y1="295" x2="1202" y2="375"/>
    <line x1="1300" y1="305" x2="1292" y2="385"/>
    <line x1="1390" y1="290" x2="1382" y2="370"/>
    <line x1="90" y1="420" x2="82" y2="500"/>
    <line x1="250" y1="410" x2="242" y2="490"/>
    <line x1="460" y1="425" x2="452" y2="505"/>
    <line x1="680" y1="415" x2="672" y2="495"/>
    <line x1="900" y1="420" x2="892" y2="500"/>
    <line x1="1140" y1="415" x2="1132" y2="495"/>
    <line x1="1360" y1="408" x2="1352" y2="488"/>
  </g>

  <!-- Water reflection of lightning -->
  <ellipse cx="290" cy="700" rx="60" ry="20" fill="#3366aa" opacity="0.2"/>
  <ellipse cx="910" cy="720" rx="55" ry="18" fill="#3366aa" opacity="0.15"/>

  <!-- Dim stars above clouds -->
  <g fill="#8899cc" opacity="0.2">
    <circle cx="60" cy="30" r="1"/><circle cx="180" cy="18" r="1.2"/><circle cx="400" cy="40" r="1"/>
    <circle cx="650" cy="22" r="1.2"/><circle cx="950" cy="35" r="1"/><circle cx="1200" cy="28" r="1.2"/>
    <circle cx="1420" cy="15" r="1"/>
