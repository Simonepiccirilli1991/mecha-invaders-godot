<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" width="1440" height="960">
  <defs>
    <linearGradient id="sky7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080300"/>
      <stop offset="30%" stop-color="#1a0a00"/>
      <stop offset="65%" stop-color="#4d2200"/>
      <stop offset="100%" stop-color="#7a3a00"/>
    </linearGradient>
    <linearGradient id="sand7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a2400"/>
      <stop offset="50%" stop-color="#2a1200"/>
      <stop offset="100%" stop-color="#140800"/>
    </linearGradient>
    <radialGradient id="sun7" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8800" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#cc4400" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#cc4400" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1440" height="960" fill="url(#sky7)"/>

  <!-- Dying sun (large, harsh) -->
  <circle cx="1200" cy="220" r="120" fill="#cc4400" opacity="0.7"/>
  <circle cx="1200" cy="220" r="85" fill="#dd5500" opacity="0.7"/>
  <circle cx="1200" cy="220" r="60" fill="#ff7700" opacity="0.7"/>
  <!-- Sun corona -->
  <circle cx="1200" cy="220" r="160" fill="none" stroke="#cc3300" stroke-width="30" opacity="0.2"/>
  <circle cx="1200" cy="220" r="200" fill="none" stroke="#aa2200" stroke-width="20" opacity="0.12"/>
  <!-- Sun heat haze -->
  <ellipse cx="1200" cy="320" rx="300" ry="100" fill="#aa3300" opacity="0.2"/>

  <!-- Dust storm clouds -->
  <g fill="#2d1400" opacity="0.8">
    <ellipse cx="120" cy="200" rx="220" ry="105"/>
    <ellipse cx="380" cy="165" rx="250" ry="110"/>
    <ellipse cx="660" cy="185" rx="270" ry="102"/>
    <ellipse cx="930" cy="160" rx="245" ry="108"/>
    <ellipse cx="1120" cy="320" rx="180" ry="85"/>
    <ellipse cx="1370" cy="195" rx="210" ry="98"/>
    <ellipse cx="260" cy="285" rx="195" ry="82"/>
    <ellipse cx="720" cy="270" rx="225" ry="86"/>
  </g>

  <!-- Sandstorm haze -->
  <rect x="0" y="400" width="1440" height="200" fill="#4d2200" opacity="0.15"/>
  <rect x="0" y="500" width="1440" height="150" fill="#6b3300" opacity="0.12"/>

  <!-- Ancient ruins silhouettes - far distance -->
  <g fill="#180a00">
    <!-- Pillars and columns -->
    <rect x="80" y="560" width="20" height="215"/>
    <rect x="75" y="558" width="30" height="14"/>
    <rect x="75" y="558" width="30" height="8" opacity="0.5"/>
    <rect x="160" y="580" width="18" height="195"/>
    <rect x="155" y="578" width="28" height="12"/>
    <rect x="260" y="545" width="22" height="230"/>
    <rect x="255" y="542" width="32" height="14"/>
    <rect x="360" y="570" width="19" height="205"/>
    <!-- Broken arch -->
    <rect x="440" y="555" width="22" height="220"/>
    <rect x="510" y="555" width="22" height="180"/>
    <rect x="440" y="553" width="92" height="25"/>
    <rect x="480" y="510" width="12" height="48"/>
    <!-- More pillars -->
    <rect x="640" y="550" width="20" height="225"/>
    <rect x="635" y="548" width="30" height="14"/>
    <rect x="730" y="568" width="18" height="207"/>
    <rect x="820" y="540" width="22" height="235"/>
    <rect x="815" y="537" width="32" height="15"/>
    <!-- Toppled column -->
    <rect x="900" y="718" width="160" height="20" transform="rotate(-8, 900, 718)"/>
    <!-- More ruins -->
    <rect x="980" y="560" width="20" height="215"/>
    <rect x="975" y="558" width="30" height="13"/>
    <rect x="1060" y="578" width="18" height="197"/>
    <rect x="1160" y="548" width="22" height="227"/>
    <rect x="1155" y="545" width="32" height="14"/>
    <rect x="1250" y="568" width="19" height="207"/>
    <!-- Broken pyramid -->
    <polygon points="1310,775 1360,640 1410,775"/>
    <polygon points="1320,775 1360,660 1400,775"/>
    <polygon points="1350,640 1360,610 1370,640"/>
  </g>

  <!-- Sand dunes ground -->
  <rect y="760" width="1440" height="200" fill="url(#sand7)"/>

  <!-- Dune shapes -->
  <g fill="#3d1a00">
    <path d="M 0 785 Q 180 750 360 785 Q 540 820 720 785 Q 900 750 1080 785 Q 1260 820 1440 785 L 1440 960 L 0 960 Z"/>
  </g>
  <g fill="#2a1000">
    <path d="M 0 830 Q 200 808 400 830 Q 600 852 800 828 Q 1000 804 1200 830 Q 1300 843 1440 828 L 1440 960 L 0 960 Z"/>
  </g>

  <!-- Scattered bones -->
  <g fill="#220f00" opacity="0.7">
    <!-- Bone 1 -->
    <ellipse cx="150" cy="795" rx="25" ry="6"/>
    <ellipse cx="128" cy="795" rx="8" ry="8"/>
    <ellipse cx="172" cy="795" rx="8" ry="8"/>
    <!-- Bone 2 -->
    <ellipse cx="420" cy="810" rx="22" ry="5" transform="rotate(25, 420, 810)"/>
    <ellipse cx="400" cy="803" rx="7" ry="7"/>
    <ellipse cx="440" cy="817" rx="7" ry="7"/>
    <!-- Bone 3 -->
    <ellipse cx="680" cy="798" rx="28" ry="6"/>
    <ellipse cx="655" cy="798" rx="9" ry="9"/>
    <ellipse cx="705" cy="798" rx="9" ry="9"/>
    <!-- Skull -->
    <circle cx="950" cy="792" r="15" fill="#220f00"/>
    <circle cx="944" cy="788" r="4" fill="#180b00"/>
    <circle cx="956" cy="788" r="4" fill="#180b00"/>
    <rect x="941" y="800" width="18" height="8" rx="2" fill="#180b00"/>
    <!-- More bones -->
    <ellipse cx="1200" cy="805" rx="24" ry="5" transform="rotate(-15, 1200, 805)"/>
    <ellipse cx="1178" cy="798" rx="8" ry="8"/>
    <ellipse cx="1222" cy="812" rx="8" ry="8"/>
    <ellipse cx="1380" cy="798" rx="26" ry="6"/>
    <ellipse cx="1357" cy="798" rx="9" ry="9"/>
    <ellipse cx="1403" cy="798" rx="9" ry="9"/>
  </g>

  <!-- Sand dust particles -->
  <g fill="#aa5500" opacity="0.4">
    <circle cx="100" cy="420" r="2"/><circle cx="220" cy="455" r="1.5"/><circle cx="360" cy="428" r="2"/>
    <circle cx="500" cy="460" r="1.5"/><circle cx="640" cy="435" r="2"/><circle cx="780" cy="465" r="1.5"/>
    <circle cx="920" cy="440" r="2"/><circle cx="1060" cy="458" r="1.5"/><circle cx="1200" cy="432" r="2"/>
    <circle cx="1340" cy="462" r="1.5"/>
    <circle cx="160" cy="520" r="1.5"/><circle cx="320" cy="540" r="2"/><circle cx="520" cy="525" r="1.5"/>
    <circle cx="720" cy="538" r="2"/><circle cx="920" cy="528" r="1.5"/><circle cx="1120" cy="542" r="2"/>
    <circle cx="1320" cy="530" r="1.5"/>
  </g>

  <!-- Dim stars -->
  <g fill="#ff9966" opacity="0.2">
    <circle cx="50" cy="35" r="1.2"/><circle cx="170" cy="22" r="1"/><circle cx="290" cy="48" r="1.4"/>
    <circle cx="460" cy="18" r="1"/><circle cx="620" cy="40" r="1.2"/><circle cx="780" cy="25" r="1"/>
    <circle cx="1350" cy="38" r="1.2"/><circle cx="1420" cy="20" r="1"/>
  </g>
</svg>
