  <!-- Ground -->
  <rect y="755" width="1440" height="205" fill="url(#ground9)"/>

  <!-- Electric arc lines -->
  <g opacity="0.7">
    <!-- Arc 1 -->
    <polyline points="85,420 72,460 88,460 70,510" fill="none" stroke="#00bbff" stroke-width="2"/>
    <polyline points="85,420 98,460 84,460 102,510" fill="none" stroke="#00bbff" stroke-width="1.5"/>
    <circle cx="85" cy="418" r="5" fill="#00bbff" opacity="0.6"/>
    <circle cx="70" cy="510" r="4" fill="#00bbff" opacity="0.4"/>

    <!-- Arc 2 -->
    <polyline points="420,390 408,432 422,432 404,485" fill="none" stroke="#00ccff" stroke-width="2"/>
    <polyline points="420,390 432,432 418,432 436,485" fill="none" stroke="#00ccff" stroke-width="1.5"/>
    <circle cx="420" cy="388" r="5" fill="#00ccff" opacity="0.6"/>
    <circle cx="404" cy="485" r="4" fill="#00ccff" opacity="0.4"/>

    <!-- Arc 3 -->
    <polyline points="760,400 748,445 762,445 744,498" fill="none" stroke="#00aaff" stroke-width="2.5"/>
    <polyline points="760,400 772,445 758,445 776,498" fill="none" stroke="#00aaff" stroke-width="2"/>
    <circle cx="760" cy="398" r="6" fill="#00aaff" opacity="0.7"/>
    <circle cx="744" cy="498" r="5" fill="#00aaff" opacity="0.5"/>

    <!-- Arc 4 -->
    <polyline points="1080,385 1068,428 1082,428 1064,482" fill="none" stroke="#22ddff" stroke-width="2"/>
    <polyline points="1080,385 1092,428 1078,428 1096,482" fill="none" stroke="#22ddff" stroke-width="1.5"/>
    <circle cx="1080" cy="383" r="5" fill="#22ddff" opacity="0.6"/>

    <!-- Arc 5 between structures -->
    <polyline points="220,400 340,380 360,400" fill="none" stroke="#0099cc" stroke-width="1.5" opacity="0.6"/>
    <polyline points="620,410 740,388 760,410" fill="none" stroke="#0099cc" stroke-width="1.5" opacity="0.6"/>
    <polyline points="1000,395 1140,372 1160,395" fill="none" stroke="#0099cc" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Arc glow spots -->
  <g opacity="0.3">
    <circle cx="85" cy="468" r="18" fill="url(#arcglow)"/>
    <circle cx="420" cy="452" r="16" fill="url(#arcglow)"/>
    <circle cx="760" cy="448" r="22" fill="url(#arcglow)"/>
    <circle cx="1080" cy="435" r="18" fill="url(#arcglow)"/>
  </g>

  <!-- Burning machine fires -->
  <g opacity="0.5">
    <ellipse cx="160" cy="760" rx="50" ry="20" fill="url(#fireglow9)"/>
    <ellipse cx="500" cy="755" rx="60" ry="22" fill="url(#fireglow9)"/>
    <ellipse cx="880" cy="758" rx="55" ry="20" fill="url(#fireglow9)"/>
    <ellipse cx="1250" cy="752" rx="50" ry="18" fill="url(#fireglow9)"/>
  </g>
  <g fill="#cc3300" opacity="0.5">
    <polygon points="145,760 160,720 175,760"/>
    <polygon points="155,760 165,730 175,760"/>
    <polygon points="485,760 500,715 515,760"/>
    <polygon points="495,760 505,728 515,760"/>
    <polygon points="865,760 880,718 895,760"/>
    <polygon points="875,760 885,728 895,760"/>
    <polygon points="1235,760 1250,720 1265,760"/>
    <polygon points="1245,760 1255,732 1265,760"/>
  </g>

  <!-- Smoke from machines -->
  <g fill="#020810" opacity="0.5">
    <ellipse cx="85" cy="350" rx="40" ry="30"/>
    <ellipse cx="200" cy="320" rx="45" ry="32"/>
    <ellipse cx="395" cy="340" rx="42" ry="31"/>
    <ellipse cx="595" cy="325" rx="44" ry="30"/>
    <ellipse cx="795" cy="335" rx="46" ry="33"/>
    <ellipse cx="995" cy="328" rx="43" ry="30"/>
    <ellipse cx="1175" cy="340" rx="45" ry="31"/>
    <ellipse cx="1365" cy="330" rx="40" ry="29"/>
  </g>
</svg>
