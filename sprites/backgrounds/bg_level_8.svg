<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" width="1440" height="960">
  <defs>
    <linearGradient id="sky8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="40%" stop-color="#04000d"/>
      <stop offset="70%" stop-color="#080014"/>
      <stop offset="100%" stop-color="#0d001a"/>
    </linearGradient>
    <linearGradient id="rift8" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d001a" stop-opacity="0"/>
      <stop offset="30%" stop-color="#1a0044" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#220055" stop-opacity="1"/>
      <stop offset="70%" stop-color="#1a0044" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0d001a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="riftcore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8800ff" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#4400aa" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#220055" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#220055" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula8" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#330066" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#330066" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a000f"/>
      <stop offset="100%" stop-color="#030005"/>
    </linearGradient>
  </defs>

  <!-- Deep space sky -->
  <rect width="1440" height="960" fill="url(#sky8)"/>

  <!-- Nebula behind rift -->
  <ellipse cx="720" cy="350" rx="600" ry="280" fill="url(#nebula8)"/>
  <ellipse cx="720" cy="350" rx="400" ry="180" fill="#1a0033" opacity="0.3"/>

  <!-- Stars (dense, space) -->
  <g fill="#ffffff" opacity="0.8">
    <circle cx="28" cy="22" r="1.5"/><circle cx="78" cy="48" r="1"/><circle cx="142" cy="12" r="1.8"/>
    <circle cx="198" cy="65" r="1.2"/><circle cx="255" cy="32" r="1.5"/><circle cx="318" cy="55" r="1"/>
    <circle cx="378" cy="18" r="1.8"/><circle cx="435" cy="72" r="1.2"/><circle cx="492" cy="40" r="1.5"/>
    <circle cx="558" cy="14" r="1"/><circle cx="618" cy="68" r="1.8"/><circle cx="678" cy="30" r="1.2"/>
    <circle cx="738" cy="52" r="1.5"/><circle cx="800" cy="20" r="1"/><circle cx="862" cy="65" r="1.8"/>
    <circle cx="920" cy="38" r="1.2"/><circle cx="982" cy="60" r="1.5"/><circle cx="1045" cy="18" r="1"/>
    <circle cx="1108" cy="55" r="1.8"/><circle cx="1168" cy="28" r="1.2"/><circle cx="1232" cy="48" r="1.5"/>
    <circle cx="1298" cy="22" r="1"/><circle cx="1358" cy="62" r="1.8"/><circle cx="1418" cy="35" r="1.2"/>
  </g>
  <g fill="#ffffff" opacity="0.5">
    <circle cx="60" cy="100" r="1"/><circle cx="148" cy="88" r="1.3"/><circle cx="238" cy="112" r="1"/>
    <circle cx="328" cy="95" r="1.3"/><circle cx="420" cy="108" r="1"/><circle cx="510" cy="90" r="1.3"/>
    <circle cx="600" cy="115" r="1"/><circle cx="690" cy="98" r="1.3"/><circle cx="780" cy="110" r="1"/>
    <circle cx="870" cy="92" r="1.3"/><circle cx="960" cy="118" r="1"/><circle cx="1050" cy="95" r="1.3"/>
    <circle cx="1140" cy="108" r="1"/><circle cx="1230" cy="88" r="1.3"/><circle cx="1320" cy="112" r="1"/>
    <circle cx="1410" cy="98" r="1.3"/>
  </g>
  <!-- Colored stars / distant galaxies -->
  <g opacity="0.6">
    <circle cx="180" cy="145" r="1.5" fill="#aabbff"/>
    <circle cx="480" cy="130" r="2" fill="#ffbbaa"/>
    <circle cx="780" cy="155" r="1.5" fill="#aaffbb"/>
    <circle cx="1080" cy="138" r="2" fill="#aabbff"/>
    <circle cx="1380" cy="148" r="1.5" fill="#ffbbaa"/>
    <circle cx="330" cy="180" r="1.5" fill="#ffbbaa"/>
    <circle cx="630" cy="168" r="2" fill="#aabbff"/>
    <circle cx="930" cy="178" r="1.5" fill="#aaffbb"/>
    <circle cx="1230" cy="165" r="2" fill="#aabbff"/>
  </g>

  <!-- THE RIFT - main feature -->
  <!-- Rift outer glow -->
  <ellipse cx="720" cy="340" rx="380" ry="240" fill="#330066" opacity="0.4"/>
  <ellipse cx="720" cy="340" rx="280" ry="175" fill="#550099" opacity="0.3"/>

  <!-- Rift tear shape -->
  <path d="M 500 140 Q 580 200 560 280 Q 540 360 580 440 Q 620 520 600 600 Q 580 660 620 700 L 660 700 Q 640 660 660 600 Q 700 520 680 440 Q 660 360 680 280 Q 700 200 780 140 Q 750 160 720 180 Q 690 160 660 140 Z" fill="#6600cc" opacity="0.7"/>
  <path d="M 720 160 Q 770 200 760 290 Q 750 380 780 460 Q 810 530 800 610 Q 790 670 820 710 L 840 710 Q 830 670 840 610 Q 860 530 850 460 Q 840 380 860 290 Q 880 200 940 155 Q 900 170 860 180 Q 820 168 780 155 Q 750 160 720 160 Z" fill="#8800ff" opacity="0.5"/>

  <!-- Rift core light -->
  <ellipse cx="720" cy="400" rx="60" ry="160" fill="url(#riftcore)"/>
  <ellipse cx="720" cy="400" rx="30" ry="100" fill="#aa44ff" opacity="0.4"/>
  <ellipse cx="720" cy="400" rx="10" ry="50" fill="#ffffff" opacity="0.2"/>

  <!-- Rift edges / cracks -->
  <g fill="none" stroke="#9922ff" stroke-width="2" opacity="0.5">
    <line x1="560" y1="190" x2="480" y2="155"/>
    <line x1="560" y1="260" x2="460" y2="240"/>
    <line x1="600" y1="480" x2="510" y2="500"/>
    <line x1="590" y1="580" x2="500" y2="590"/>
    <line x1="880" y1="195" x2="960" y2="160"/>
    <line x1="870" y1="270" x2="970" y2="255"/>
    <line x1="850" y1="490" x2="940" y2="510"/>
    <line x1="860" y1="590" x2="955" y2="600"/>
  </g>

  <!-- Space debris / asteroids falling through rift -->
  <g fill="#1a1a2a">
    <ellipse cx="400" cy="480" rx="22" ry="16" transform="rotate(25, 400, 480)"/>
    <ellipse cx="900" cy="420" rx="18" ry="13" transform="rotate(-15, 900, 420)"/>
    <ellipse cx="300" cy="600" rx="25" ry="18" transform="rotate(40, 300, 600)"/>
    <ellipse cx="1050" cy="520" rx="20" ry="14" transform="rotate(-30, 1050, 520)"/>
    <ellipse cx="200" cy="380" rx="15" ry="11" transform="rotate(18, 200, 380)"/>
    <ellipse cx="1150" cy="350" rx="28" ry="19" transform="rotate(-22, 1150, 350)"/>
    <ellipse cx="1200" cy="500" rx="16" ry="12" transform="rotate(35, 1200, 500)"/>
    <ellipse cx="180" cy="520" rx="12" ry="9" transform="rotate(-12, 180, 520)"/>
  </g>
  <!-- Asteroid highlight -->
  <g fill="#2a2a3d" opacity="0.6">
    <ellipse cx="396" cy="477" rx="10" ry="7" transform="rotate(25, 396, 477)"/>
    <ellipse cx="897" cy="417" rx="8" ry="5" transform="rotate(-15, 897, 417)"/>
    <ellipse cx="297" cy="597" rx="11" ry="8" transform="rotate(40, 297, 597)"/>
    <ellipse cx="1047" cy="517" rx="9" ry="6" transform="rotate(-30, 1047, 517)"/>
  </g>

  <!-- Ground - destroyed dark earth -->
  <rect y="755" width="1440" height="205" fill="url(#ground8)"/>

  <!-- Ruined ground silhouettes -->
  <g fill="#060008">
    <polygon points="0,760 80,700 160,760"/>
    <polygon points="140,762 220,695 300,762"/>
    <polygon points="280,758 370,688 460,758"/>
    <polygon points="440,761 530,698 620,761"/>
    <polygon points="600,759 700,682 800,759"/>
    <polygon points="780,762 880,692 980,762"/>
    <polygon points="960,758 1060,685 1160,758"/>
    <polygon points="1140,761 1240,695 1340,761"/>
    <polygon points="1320,759 1400,700 1440,730 1440,759"/>
  </g>

  <!-- Rift glow on ground -->
  <ellipse cx="720" cy="760" rx="350" ry="80" fill="#4400aa" opacity="0.15"/>
</svg>
