  <rect x="2"  y="36" width="12" height="10" rx="1" fill="#E65100"/>
  <rect x="3"  y="37" width="10" height="8"  rx="1" fill="#EF6C00"/>
  <rect x="1"  y="46" width="14" height="4"  rx="1.5" fill="#0D0D0D"/>
  <rect x="1"  y="50" width="13" height="12" rx="1" fill="#E65100"/>
  <rect x="2"  y="51" width="11" height="10" rx="1" fill="#EF6C00"/>
  <rect x="3"  y="53" width="8"  height="2"  fill="#F9A825"/>
  <!-- Golden fist -->
  <rect x="1"  y="62" width="14" height="10" rx="2" fill="#F9A825"/>
  <rect x="2"  y="63" width="12" height="8"  rx="1" fill="#FFF9C4"/>
  <!-- RIGHT ARM -->
  <rect x="66" y="36" width="12" height="10" rx="1" fill="#E65100"/>
  <rect x="67" y="37" width="10" height="8"  rx="1" fill="#EF6C00"/>
  <rect x="65" y="46" width="14" height="4"  rx="1.5" fill="#0D0D0D"/>
  <rect x="66" y="50" width="13" height="12" rx="1" fill="#E65100"/>
  <rect x="67" y="51" width="11" height="10" rx="1" fill="#EF6C00"/>
  <rect x="68" y="53" width="8"  height="2"  fill="#F9A825"/>
  <rect x="65" y="62" width="14" height="10" rx="2" fill="#F9A825"/>
  <rect x="66" y="63" width="12" height="8"  rx="1" fill="#FFF9C4"/>

  <!-- NECK -->
  <rect x="33" y="20" width="14" height="5" rx="1" fill="#0D0D0D"/>
  <rect x="34" y="21" width="12" height="3" rx="0.5" fill="#1A1A1A"/>

  <!-- HEAD (Royal crown / solar king) -->
  <rect x="22" y="8"  width="36" height="13" rx="2" fill="#0D0D0D"/>
  <rect x="23" y="9"  width="34" height="11" rx="1" fill="#1A1A1A"/>
  <!-- Golden forehead plate -->
  <rect x="24" y="9"  width="32" height="5"  rx="0.5" fill="#F9A825"/>
  <rect x="25" y="10" width="30" height="3"  rx="0.3" fill="#FFF9C4"/>
  <!-- Visor (golden-orange) -->
  <rect x="24" y="15" width="32" height="4"  rx="0.5" fill="#F9A825"/>
  <rect x="25" y="15.5" width="30" height="3" rx="0.3" fill="#FB8C00"/>
  <rect x="28" y="16"   width="24" height="2" fill="#FFD740" opacity="0.7"/>
  <!-- Chin plate -->
  <rect x="26" y="20" width="28" height="2"  rx="0.5" fill="#1A1A1A"/>
  <!-- Side ornaments -->
  <rect x="18" y="10" width="6"  height="9"  rx="0.5" fill="#E65100"/>
  <rect x="19" y="11" width="4"  height="3"  rx="0.3" fill="#F9A825"/>
  <rect x="19" y="16" width="4"  height="2"  rx="0.3" fill="#F9A825"/>
  <rect x="56" y="10" width="6"  height="9"  rx="0.5" fill="#E65100"/>
  <rect x="57" y="11" width="4"  height="3"  rx="0.3" fill="#F9A825"/>
  <rect x="57" y="16" width="4"  height="2"  rx="0.3" fill="#F9A825"/>

  <!-- SOLAR CROWN (the most regal element — Daitarn/Solaron signature) -->
  <!-- Crown base ring -->
  <rect x="22" y="7"  width="36" height="3"  rx="0.5" fill="#F9A825"/>
  <rect x="23" y="7.5" width="34" height="2" rx="0.3" fill="#FFF9C4"/>
  <!-- Crown spikes (5 solar spikes) -->
  <polygon points="24,7 22,1 28,5"  fill="#F9A825"/>
  <polygon points="32,7 30,1 36,5"  fill="#F9A825"/>
  <polygon points="40,7 38,0 42,0 40,-3" fill="#F9A825"/><!-- center tall spike -->
  <polygon points="48,7 50,1 44,5"  fill="#F9A825"/>
  <polygon points="56,7 58,1 52,5"  fill="#F9A825"/>
  <!-- Spike highlights -->
  <polygon points="25,7 23,2 27,6"  fill="#FFF9C4"/>
  <polygon points="33,7 31,2 35,6"  fill="#FFF9C4"/>
  <polygon points="40,5 39,1 41,1 40,-1" fill="#FFF9C4"/>
  <polygon points="47,7 49,2 45,6"  fill="#FFF9C4"/>
  <polygon points="55,7 57,2 53,6"  fill="#FFF9C4"/>
  <!-- Crown jewels at spike bases -->
  <circle cx="26" cy="7" r="1.2" fill="#FF6D00"/>
  <circle cx="34" cy="7" r="1.2" fill="#FF6D00"/>
  <circle cx="40" cy="7" r="1.5" fill="#FAFAFA"/>
  <circle cx="46" cy="7" r="1.2" fill="#FF6D00"/>
  <circle cx="54" cy="7" r="1.2" fill="#FF6D00"/>
  <!-- Top center sun gem -->
  <circle cx="40" cy="-2" r="2" fill="#F9A825"/>
  <circle cx="40" cy="-2" r="1.2" fill="#FFF9C4"/>
</svg>
