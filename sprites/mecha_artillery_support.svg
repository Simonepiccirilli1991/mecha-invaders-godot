  <circle cx="40" cy="34" r="9"   fill="#F9A825"/>
  <circle cx="40" cy="34" r="7"   fill="#FB8C00"/>
  <circle cx="40" cy="34" r="5"   fill="#F9A825"/>
  <!-- Sun rays -->
  <polygon points="40,24 41.5,28 38.5,28" fill="#FFF9C4"/><!-- top -->
  <polygon points="40,44 41.5,40 38.5,40" fill="#FFF9C4"/><!-- bottom -->
  <polygon points="31,34 35,32.5 35,35.5" fill="#FFF9C4"/><!-- left -->
  <polygon points="49,34 45,32.5 45,35.5" fill="#FFF9C4"/><!-- right -->
  <polygon points="34,27 36,31 33,32"      fill="#FFF9C4"/><!-- top-left -->
  <polygon points="46,27 44,31 47,32"      fill="#FFF9C4"/><!-- top-right -->
  <polygon points="34,41 36,37 33,36"      fill="#FFF9C4"/><!-- bottom-left -->
  <polygon points="46,41 44,37 47,36"      fill="#FFF9C4"/><!-- bottom-right -->
