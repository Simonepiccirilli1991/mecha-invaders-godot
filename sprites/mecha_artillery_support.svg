  <rect x="15" y="47" width="50" height="4"  rx="0.5" fill="#1A1A1A"/>
  <!-- Golden belt ornaments -->
  <rect x="16" y="47" width="12" height="4"  rx="0.5" fill="#F9A825"/>
  <rect x="52" y="47" width="12" height="4"  rx="0.5" fill="#F9A825"/>
  <!-- SUN BUCKLE -->
  <circle cx="40" cy="49" r="5"   fill="#F9A825"/>
  <circle cx="40" cy="49" r="3.5" fill="#FFF9C4"/>
  <circle cx="40" cy="49" r="2"   fill="#F9A825"/>
  <circle cx="40" cy="49" r="1"   fill="#FAFAFA"/>
