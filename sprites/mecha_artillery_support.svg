  <rect x="10" y="30" width="4" height="12" rx="0.5" fill="#0D0D0D"/>
  <rect x="11" y="31" width="2" height="3" fill="#F9A825"/>
  <rect x="11" y="36" width="2" height="3" fill="#F9A825"/>
  <rect x="66" y="30" width="4" height="12" rx="0.5" fill="#0D0D0D"/>
  <rect x="67" y="31" width="2" height="3" fill="#F9A825"/>
  <rect x="67" y="36" width="2" height="3" fill="#F9A825"/>

