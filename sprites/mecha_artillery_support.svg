  <rect x="13" y="50" width="22" height="14" rx="1" fill="#E65100"/>
  <rect x="14" y="51" width="20" height="12" rx="1" fill="#EF6C00"/>
  <rect x="15" y="52" width="16" height="4"  rx="0.5" fill="#F9A825"/>
  <rect x="47" y="50" width="22" height="14" rx="1" fill="#E65100"/>
  <rect x="48" y="51" width="20" height="12" rx="1" fill="#EF6C00"/>
  <rect x="49" y="52" width="16" height="4"  rx="0.5" fill="#F9A825"/>

