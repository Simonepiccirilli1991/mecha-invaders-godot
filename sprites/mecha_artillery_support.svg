  <rect x="0"  y="28.5" width="12" height="2" fill="#FFF9C4" opacity="0.7"/>
  <!-- Right cannon system -->
  <rect x="66" y="18" width="16" height="24" rx="2" fill="#0D0D0D"/>
  <rect x="67" y="19" width="14" height="22" rx="1" fill="#1A1A1A"/>
  <!-- Triple barrel right -->
  <rect x="66" y="10" width="4"  height="12" rx="1" fill="#0D0D0D"/>
  <rect x="71" y="8"  width="4"  height="14" rx="1" fill="#0D0D0D"/>
  <rect x="76" y="10" width="4"  height="12" rx="1" fill="#0D0D0D"/>
  <circle cx="68" cy="10" r="1.5" fill="#F9A825" opacity="0.9"/>
  <circle cx="73" cy="8"  r="1.5" fill="#F9A825" opacity="0.9"/>
  <circle cx="78" cy="10" r="1.5" fill="#F9A825" opacity="0.9"/>
  <rect x="67" y="28" width="14" height="3"  rx="0.5" fill="#F9A825"/>
  <rect x="68" y="28.5" width="12" height="2" fill="#FFF9C4" opacity="0.7"/>

