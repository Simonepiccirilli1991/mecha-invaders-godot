  <rect x="0"  y="10" width="4"  height="12" rx="1" fill="#0D0D0D"/>
  <rect x="5"  y="8"  width="4"  height="14" rx="1" fill="#0D0D0D"/>
  <rect x="10" y="10" width="4"  height="12" rx="1" fill="#0D0D0D"/>
