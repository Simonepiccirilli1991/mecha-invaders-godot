<?xml version="1.0" encoding="UTF-8"?>
<!-- SOLARON — The Sun King | Inspired by Daitarn 3 / Voltes V -->
<!-- Solar Gold #F9A825 · Deep Orange #E65100 · White #FAFAFA · Royal Black -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" width="80" height="100">

  <!-- ENERGY AURA (golden glow behind body) -->
  <ellipse cx="40" cy="50" rx="35" ry="42" fill="#F9A825" opacity="0.07"/>

  <!-- FEET (heavy, regal) -->
  <rect x="11" y="90" width="24" height="9"  rx="2" fill="#0D0D0D"/>
  <rect x="10" y="93" width="26" height="6"  rx="1" fill="#1A1A1A"/>
  <rect x="12" y="90" width="22" height="2"  fill="#F9A825"/>
  <rect x="45" y="90" width="24" height="9"  rx="2" fill="#0D0D0D"/>
  <rect x="44" y="93" width="26" height="6"  rx="1" fill="#1A1A1A"/>
  <rect x="46" y="90" width="22" height="2"  fill="#F9A825"/>

  <!-- SHINS (golden armor plates) -->
  <rect x="13" y="68" width="22" height="24" rx="1" fill="#E65100"/>
  <rect x="14" y="69" width="20" height="22" rx="1" fill="#EF6C00"/>
  <!-- Gold front plate -->
  <rect x="15" y="70" width="16" height="12" rx="0.5" fill="#F9A825"/>
  <rect x="16" y="71" width="14" height="10" rx="0.3" fill="#FB8C00"/>
  <rect x="18" y="73" width="10" height="4"  rx="0.3" fill="#FFF9C4" opacity="0.6"/>
  <!-- Gold calf trim -->
  <rect x="14" y="84" width="20" height="2"  fill="#F9A825"/>
  <rect x="47" y="68" width="22" height="24" rx="1" fill="#E65100"/>
  <rect x="48" y="69" width="20" height="22" rx="1" fill="#EF6C00"/>
  <rect x="49" y="70" width="16" height="12" rx="0.5" fill="#F9A825"/>
  <rect x="50" y="71" width="14" height="10" rx="0.3" fill="#FB8C00"/>
  <rect x="52" y="73" width="10" height="4"  rx="0.3" fill="#FFF9C4" opacity="0.6"/>
  <rect x="48" y="84" width="20" height="2"  fill="#F9A825"/>

  <!-- KNEES (ornate golden guard) -->
  <rect x="11" y="62" width="26" height="8"  rx="2" fill="#0D0D0D"/>
  <rect x="12" y="63" width="24" height="6"  rx="1" fill="#1A1A1A"/>
  <!-- Diamond knee gem -->
  <polygon points="24,60 28,64 24,68 20,64" fill="#F9A825"/>
  <polygon points="24,61 27,64 24,67 21,64" fill="#FFF9C4"/>
  <circle cx="24" cy="64" r="1" fill="#FAFAFA"/>
  <rect x="43" y="62" width="26" height="8"  rx="2" fill="#0D0D0D"/>
  <rect x="44" y="63" width="24" height="6"  rx="1" fill="#1A1A1A"/>
  <polygon points="56,60 60,64 56,68 52,64" fill="#F9A825"/>
  <polygon points="56,61 59,64 56,67 53,64" fill="#FFF9C4"/>
  <circle cx="56" cy="64" r="1" fill="#FAFAFA"/>

