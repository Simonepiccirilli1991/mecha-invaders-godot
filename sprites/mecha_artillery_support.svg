  <polygon points="12,25 68,25 70,45 10,45" fill="#EF6C00"/>
  <!-- White hero front plate -->
  <polygon points="22,25 58,25 56,44 24,44" fill="#FAFAFA"/>
  <polygon points="24,26 56,26 54,43 26,43" fill="#FFFFFF"/>
